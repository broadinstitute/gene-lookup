<script>
    // Add back link and page title above IGV (outside igv-row so it's always visible)
    $('#igv-row').before(`
        <div class="ui row" style="padding-bottom: 0;">
            <div class="two wide column"></div>
            <div class="twelve wide column" style="padding: 10px 20px 5px 20px; display: flex; align-items: center;">
                <a id="back-to-search-link" href="index.html" style="font-size: 1.1em; white-space: nowrap;">&lt; Back to search page</a>
                <div id="locus-page-title" style="flex: 1; text-align: center; font-size: 1.3em; font-weight: 600;"></div>
                <div style="width: 140px;"></div>
            </div>
            <div class="two wide column"></div>
        </div>
    `)

    $('body').css('cursor', 'wait')

    // Gene page-specific settings of the DEFAULT_GLOBAL_PAGE_STATE
    DEFAULT_GLOBAL_PAGE_STATE['hgnc_gene_id'] = ''
    DEFAULT_GLOBAL_PAGE_STATE['ensembl_gene_id'] = ''

    let GLOBAL_PAGE_STATE = JSON.parse(JSON.stringify(DEFAULT_GLOBAL_PAGE_STATE))

    const applyParamsToState = (params, {preferExisting = false} = {}) => {
        for (const [urlKey, value] of params.entries()) {
            const key = URL_PARAM_REVERSE_ALIASES[urlKey] || urlKey
            if (key in DEFAULT_GLOBAL_PAGE_STATE && value != null) {
                if (preferExisting && GLOBAL_PAGE_STATE[key] !== DEFAULT_GLOBAL_PAGE_STATE[key]) continue
                // Coerce by the type of the key's default value rather than by "looks like a number":
                // Number('') === 0 would otherwise turn an empty param (e.g. #igvLoc=) into 0, and a
                // purely-numeric string value would be turned into a Number and break string callers.
                // (Mirrors the hardened coercion in index_page_template.html.)
                const defaultVal = DEFAULT_GLOBAL_PAGE_STATE[key]
                if (typeof defaultVal === 'boolean') {
                    GLOBAL_PAGE_STATE[key] = value === 'true'
                } else if (typeof defaultVal === 'number') {
                    GLOBAL_PAGE_STATE[key] = (value !== '' && !isNaN(value)) ? Number(value) : value
                } else {
                    GLOBAL_PAGE_STATE[key] = value
                }
            }
        }
    }

    const readAndApplyPersistentPageStateFromUrl = async () => {
        GLOBAL_PAGE_STATE = JSON.parse(JSON.stringify(DEFAULT_GLOBAL_PAGE_STATE))

        const urlArgs = window.location.hash.substring(1)
        const hashParams = new URLSearchParams(urlArgs)
        const queryParams = new URLSearchParams(window.location.search)

        if ([...hashParams.keys()].length > 0) {
            applyParamsToState(hashParams)
        }
        if ([...queryParams.keys()].length > 0) {
            applyParamsToState(queryParams, {preferExisting: true})
        }

        // hgnc_gene_id contains a colon (e.g. "HGNC:1100") so it gets parsed as NaN — force it back to a string
        if (hashParams.has('hgnc_gene_id') || queryParams.has('hgnc_gene_id')) {
            GLOBAL_PAGE_STATE['hgnc_gene_id'] = (hashParams.get('hgnc_gene_id') || queryParams.get('hgnc_gene_id'))
        }
        // ensembl_gene_id (ENSG...) may also be parsed incorrectly — force it back to a string
        if (hashParams.has('ensembl_gene_id') || queryParams.has('ensembl_gene_id')) {
            GLOBAL_PAGE_STATE['ensembl_gene_id'] = (hashParams.get('ensembl_gene_id') || queryParams.get('ensembl_gene_id'))
        }

        console.log("Starting to initialize page. GLOBAL_PAGE_STATE:", GLOBAL_PAGE_STATE)

        // igv: reveal the row now, but defer updateIgv() until performSearch() has set
        // igvLoc to the gene's coordinates (otherwise IGV would load at the default chr7 locus)
        if (GLOBAL_PAGE_STATE['showIGV'] === 1) {
            $('#igv-row').show()
            $('#show-igv-divider-text').hide()
            $('#hide-igv-divider-text').show()
        } else {
            // Idempotent restore: popstate (browser Back/Forward) re-runs this after resetting state to
            // defaults, so explicitly hide the IGV row when showIGV is no longer 1 — otherwise it would
            // stay visible from a prior state.
            $('#igv-row').hide()
            $('#hide-igv-divider-text').hide()
            $('#show-igv-divider-text').show()
        }

        // Restore custom track URLs
        for (let i = 1; i <= 3; i++) {
            $(`#igv-custom-track-url-${i}`).val(GLOBAL_PAGE_STATE[`igv_custom_track_url_${i}`] || '')
        }

        await performSearch()

        if (GLOBAL_PAGE_STATE['showIGV'] === 1) {
            await updateIgv()
        }
    }

    $('#show-igv-divider').click(async () => {
        GLOBAL_PAGE_STATE['showIGV'] = (GLOBAL_PAGE_STATE['showIGV'] === 1) ? 0 : 1
        writePersistentPageStateToUrl()

        if (GLOBAL_PAGE_STATE['showIGV'] === 1) {
            $('#igv-row').show()
            $('#show-igv-divider-text').hide()
            $('#hide-igv-divider-text').show()
            await updateIgv()
        } else {
            $('#igv-row').slideUp(500, () => {
                $('#hide-igv-divider-text').hide()
                $('#show-igv-divider-text').show()
            })
        }
    })

    const displayError = (message) => {
        $('#error-text').text(message)
        $('#error-message').show()
    }

    const hasAnyValue = (...values) => values.some(v => v != null && v !== '')

    const displaySearchResults = () => {
        const row = window.searchResults.rows[0]

        const geneSymbol = row['gene_symbol'] || ''
        const hgncId = row['hgnc_gene_id'] || ''
        const geneId = row['ensembl_gene_id'] || ''
        const refseqId = row['refseq_id'] || ''
        // ncbi_gene_id is a nullable INTEGER (NULL/absent when unavailable)
        const ncbiGeneId = (row['ncbi_gene_id'] != null && Number(row['ncbi_gene_id']) > 0) ? String(row['ncbi_gene_id']) : ''
        const inMANE = row['in_MANE'] === true || row['in_MANE'] === 'true'
        const maneSelectRefseq = row['MANE_canonical_transcript_refseq_id'] || ''
        const maneSelectEnsembl = row['MANE_canonical_transcript_ensembl_id'] || ''
        const maneClinicalRefseq = row['MANE_clinical_transcript_refseq_id'] || ''
        const maneClinicalEnsembl = row['MANE_clinical_transcript_ensembl_id'] || ''
        const displayName = geneSymbol || hgncId || geneId || 'Unknown'
        const chrom = row['gene_chrom'] || ''
        const start = row['gene_start']
        const end = row['gene_end']
        const coordsValid = chrom && start != null && end != null
        const coordsText = coordsValid ? `${chrom.startsWith('chr') ? '' : 'chr'}${chrom}:${start}-${end}` : ''
        const coordinates = coordsValid
            ? `<span id="coordinates-igv-link" class="action-link" style="cursor: pointer;" data-chrom="${chrom}" data-start="${start}" data-end="${end}">${coordsText}</span>`
            : ''

        // Set page title
        document.title = `Gene Lookup: ${displayName}`
        $('#locus-page-title').text(`Gene Page: ${displayName}`)

        // Update back link
        const urlArgs = window.location.hash.substring(1)
        $('#back-to-search-link').attr('href', `index.html#${urlArgs}`)

        // --- Left column (row1-box1) ---
        // Link helpers for RefSeq/Ensembl transcript accessions (values may be single or "; "/","-joined)
        const encU = encodeURIComponent
        const refseqLink = (acc) => `<a href="https://www.ncbi.nlm.nih.gov/nuccore/${encU(acc)}" target="_blank" class="action-link">${acc}</a>`
        const enstLink = (t) => `<a href="https://ensembl.org/Homo_sapiens/Transcript/Summary?t=${encU(t)}" target="_blank" class="action-link">${t}</a>`
        const linkIdList = (val, fn) => (val || '').split(/[;,]\s*/).map(s => s.trim()).filter(Boolean).map(fn).join(', ')
        const maneSelectParts = [maneSelectRefseq ? linkIdList(maneSelectRefseq, refseqLink) : '', maneSelectEnsembl ? linkIdList(maneSelectEnsembl, enstLink) : ''].filter(Boolean).join(' &nbsp;/&nbsp; ')
        const maneClinicalParts = [maneClinicalRefseq ? linkIdList(maneClinicalRefseq, refseqLink) : '', maneClinicalEnsembl ? linkIdList(maneClinicalEnsembl, enstLink) : ''].filter(Boolean).join(' &nbsp;/&nbsp; ')

        let box1 = '<table class="locus-info-table">'
        box1 += `<tr><td class="locus-info-label">Gene Symbol:</td><td style="font-weight: bold; font-size: 1.1em;">${geneSymbol}</td></tr>`
        box1 += `<tr><td class="locus-info-label">HGNC ID:</td><td>${hgncId ? `<a href="https://www.genenames.org/data/gene-symbol-report/#!/hgnc_id/${hgncId}" target="_blank" class="action-link">${hgncId}</a>` : ''}</td></tr>`
        box1 += `<tr><td class="locus-info-label">Gene ID:</td><td>${geneId ? `<a href="https://ensembl.org/Homo_sapiens/Gene/Summary?g=${geneId}" target="_blank" class="action-link">${geneId}</a>` : ''}</td></tr>`
        box1 += `<tr><td class="locus-info-label">RefSeq ID:</td><td>${refseqId ? linkIdList(refseqId, refseqLink) : ''}</td></tr>`
        box1 += `<tr><td class="locus-info-label">NCBI Gene ID:</td><td>${ncbiGeneId ? `<a href="https://www.ncbi.nlm.nih.gov/gene/${encU(ncbiGeneId)}" target="_blank" class="action-link">${ncbiGeneId}</a>` : ''}</td></tr>`
        box1 += `<tr><td class="locus-info-label">Aliases:</td><td>${row['gene_aliases'] || ''}</td></tr>`
        box1 += `<tr><td class="locus-info-label">Inheritance:</td><td>${renderInheritanceCell(row['inheritance'], 999)}</td></tr>`
        const sourceBadgeIds = {
            geneSymbol,
            hgncId,
            ensemblId: geneId,
            mimNumber: dedupSemicolonArray(row['OMIM_mim_number'])[0] || '',
        }
        box1 += `<tr><td class="locus-info-label">Sources:</td><td>${getSourcesBadges(row['sources'], sourceBadgeIds)}</td></tr>`
        box1 += '</table>'
        $('#locus-page-row1-box1').html(box1)

        // --- Right column (row1-box2) ---
        let box2 = '<table class="locus-info-table">'

        // Constraint scores
        const pliV2 = renderConstraintValue(row['pLI_v2'], 'pLI_v2', 'pLI (v2)')
        const pliV4 = renderConstraintValue(row['pLI_v4'], 'pLI_v4', 'pLI (v4.1.1)')
        const loeuf = renderConstraintInterval(row['lof_oe_v4'], row['lof_oe_ci_lower_v4'], row['lof_oe_ci_upper_v4'], 'LOEUF', 'LOEUF (v4.1.1)')
        const misInterval = renderConstraintInterval(row['mis_oe_v4'], row['mis_oe_ci_lower_v4'], row['mis_oe_ci_upper_v4'], 'MOEUF', 'MOEUF (v4.1.1)')
        const misZBadge = renderConstraintBadge(row['mis_z_score_v4'], 'Missense_Z', 'Missense Z (v4.1.1)')
        const moeuf = misInterval && misZBadge ? `${misInterval} &nbsp; Z = ${misZBadge}`
            : misInterval ? misInterval
            : misZBadge ? `Z = ${misZBadge}`
            : ''
        const omeletLlmPct = row['OMELET_LLM_pct'] != null && row['OMELET_LLM_pct'] !== '' ? `${Number(row['OMELET_LLM_pct']).toFixed(1)}%` : ''
        const dispoPct = row['Discovery_Potential_pct'] != null && row['Discovery_Potential_pct'] !== '' ? `${Number(row['Discovery_Potential_pct']).toFixed(1)}%` : ''
        const omeletLlmHelp = BIGQUERY_COLUMN_DESCRIPTIONS['OMELET_LLM_pct'] || ''
        const dispoHelp = BIGQUERY_COLUMN_DESCRIPTIONS['Discovery_Potential_pct'] || ''
        const omeletLlmIcon = omeletLlmPct && omeletLlmHelp ? `<i class="question circle outline icon" style="margin-left: 10px; cursor: pointer;" data-html="${enrichHelpText(omeletLlmHelp)}"></i>` : ''
        const dispoIcon = dispoPct && dispoHelp ? `<i class="question circle outline icon" style="margin-left: 10px; cursor: pointer;" data-html="${enrichHelpText(dispoHelp)}"></i>` : ''

        box2 += `<tr><td class="locus-info-label">MANE Select:</td><td>${maneSelectParts || (inMANE ? 'Yes' : 'No')}</td></tr>`
        if (maneClinicalParts) {
            box2 += `<tr><td class="locus-info-label">MANE Plus Clinical:</td><td>${maneClinicalParts}</td></tr>`
        }
        box2 += `<tr><td class="locus-info-label">Coordinates (hg38):</td><td>${coordinates}</td></tr>`
        box2 += `<tr><td class="locus-info-label">pLI (v2):</td><td>${pliV2}</td></tr>`
        box2 += `<tr><td class="locus-info-label">pLI (v4.1.1):</td><td>${pliV4}</td></tr>`
        box2 += `<tr><td class="locus-info-label">LOEUF (v4.1.1):</td><td>${loeuf}</td></tr>`
        box2 += `<tr><td class="locus-info-label">MOEUF (v4.1.1):</td><td>${moeuf}</td></tr>`
        box2 += `<tr><td class="locus-info-label">OMELET LLM %:</td><td>${omeletLlmPct}${omeletLlmIcon}</td></tr>`
        box2 += `<tr><td class="locus-info-label">DisPo %:</td><td>${dispoPct}${dispoIcon}</td></tr>`

        box2 += '</table>'
        $('#locus-page-row1-box2').html(box2)

        // Coordinates click handler: open IGV.js at this gene's locus (with the standard padding).
        // Bound after box2 renders, since #coordinates-igv-link now lives in the right column.
        $('#coordinates-igv-link').click(async () => {
            const c = $('#coordinates-igv-link').data('chrom')
            const s = parseInt($('#coordinates-igv-link').data('start'), 10)
            const e = parseInt($('#coordinates-igv-link').data('end'), 10)
            if (!c || Number.isNaN(s) || Number.isNaN(e)) return
            const paddedStart = Math.max(0, s - IGV_LOCUS_PADDING)
            const paddedEnd = e + IGV_LOCUS_PADDING
            GLOBAL_PAGE_STATE['igvLoc'] = `${c}:${paddedStart}-${paddedEnd}`
            if (GLOBAL_PAGE_STATE['showIGV'] !== 1) {
                GLOBAL_PAGE_STATE['showIGV'] = 1
                $('#igv-row').show()
                $('#show-igv-divider-text').hide()
                $('#hide-igv-divider-text').show()
            }
            writePersistentPageStateToUrl()
            await updateIgv()
            $('#igv-row')[0].scrollIntoView({ behavior: 'smooth' })
        })

        // --- External Resource Links ---
        const externalLinksLine1 = []
        const externalLinksLine2 = []
        const link = (label, url) => `<a href="${url}" target="_blank">${label}</a>`
        const enc = encodeURIComponent
        const mimNumbers = dedupSemicolonArray(row['OMIM_mim_number'])
        // For sources that also appear as a colored source badge, build the link via SOURCES[x].url(...)
        // so the two stay in sync (URL encoding, query params, etc.).
        if (mimNumbers.length > 0) externalLinksLine1.push(link('OMIM', SOURCES.OMIM.url({ mimNumber: mimNumbers[0] })))
        if (geneSymbol) externalLinksLine1.push(link('PanelAppUK', SOURCES.PanelAppUK.url({ geneSymbol })))
        if (geneSymbol) externalLinksLine1.push(link('PanelAppAU', SOURCES.PanelAppAU.url({ geneSymbol })))
        if (hgncId) externalLinksLine1.push(link('ClinGen', SOURCES.ClinGen.url({ hgncId })))
        if (hgncId) externalLinksLine1.push(link('GenCC', SOURCES.GenCC.url({ hgncId })))
        if (geneId) externalLinksLine1.push(link('Decipher', SOURCES.Decipher.url({ ensemblId: geneId })))
        if (geneSymbol) externalLinksLine1.push(link('ClinVar', SOURCES.ClinVar.url({ geneSymbol })))
        if (geneSymbol) externalLinksLine1.push(link('HGMD', `https://my.qiagendigitalinsights.com/bbp/view/hgmd/pro/gene.php?gene=${enc(geneSymbol)}`))
        if (geneSymbol) externalLinksLine1.push(link('MalaCards', `https://www.malacards.org/search/results?query=${enc(geneSymbol)}`))
        if (geneSymbol) externalLinksLine1.push(link('GeneCards', `https://www.genecards.org/cgi-bin/carddisp.pl?gene=${enc(geneSymbol)}`))
        if (ncbiGeneId) externalLinksLine1.push(link('NCBI Gene', `https://www.ncbi.nlm.nih.gov/gene/${enc(ncbiGeneId)}`))
        else if (geneId) externalLinksLine1.push(link('NCBI Gene', `https://www.ncbi.nlm.nih.gov/gene/?term=${enc(geneId)}`))
        if (geneSymbol) externalLinksLine1.push(link('Monarch', `https://monarchinitiative.org/explore?search=${enc(geneSymbol)}#search`))
        if (geneSymbol) externalLinksLine1.push(link('Orphanet', `https://www.orpha.net/en/disease/gene/${enc(geneSymbol)}`))
        if (ncbiGeneId) externalLinksLine1.push(link('MARRVEL', `https://marrvel.org/human/gene/${enc(ncbiGeneId)}`))
        if (geneId) externalLinksLine2.push(link('gnomAD', `https://gnomad.broadinstitute.org/gene/${enc(geneId)}?dataset=gnomad_r4`))
        if (geneSymbol) externalLinksLine2.push(link('primAD', `https://primad.basespace.illumina.com/gene/${enc(geneSymbol)}`))
        if (geneSymbol) externalLinksLine2.push(link('MGI', `https://www.informatics.jax.org/marker/summary?nomen=${enc(geneSymbol)}`))
        if (geneId) externalLinksLine2.push(link('GTEx', `https://www.gtexportal.org/home/gene/${enc(geneId)}`))
        if (geneId) externalLinksLine2.push(link('Protein Atlas', `https://www.proteinatlas.org/${enc(geneId)}/tissue`))
        if (geneId) externalLinksLine2.push(link('UniProt', `https://www.uniprot.org/uniprot?query=${enc(geneId)}+AND(reviewed:true)+AND(organism_id:9606)`))
        if (geneSymbol) externalLinksLine2.push(link('KEGG', `https://www.kegg.jp/kegg-bin/search_pathway_text?keyword=${enc(geneSymbol)}&viewImage=true`))
        if (geneSymbol) externalLinksLine2.push(link('STRING', `https://string-db.org/network/homo_sapiens/${enc(geneSymbol)}`))
        if (geneId) externalLinksLine2.push(link('Open Targets', `https://platform.opentargets.org/target/${enc(geneId)}`))
        if (geneSymbol) externalLinksLine2.push(link('DGIdb', `https://dgidb.org/results?searchType=gene&searchTerms=${enc(geneSymbol)}`))
        if (geneSymbol) externalLinksLine2.push(link('cBioPortal', `https://www.cbioportal.org/results/cancerTypesSummary?cancer_study_list=5c8a7d55e4b046111fee2296&gene_list=${enc(geneSymbol)}`))
        if (geneSymbol) externalLinksLine2.push(link('CIViC', `https://civicdb.org/links/entrez_name/${enc(geneSymbol)}`))
        if (geneSymbol) externalLinksLine2.push(link('AlphaFold', `https://alphafold.ebi.ac.uk/search/text/${enc(geneSymbol)}?organismScientificName=Homo%20sapiens`))
        if (geneSymbol) externalLinksLine2.push(link('TRExplorer', `https://trexplorer.broadinstitute.org/#showRs=1&q=${enc(geneSymbol)}`))
        if (geneSymbol) {
            const allNames = [geneSymbol, ...(row['gene_aliases'] || '').split(',').map(s => s.trim()).filter(s => s)]
            externalLinksLine2.push(link('PubMed', `https://www.ncbi.nlm.nih.gov/pubmed/?term=(${allNames.map(enc).join('+OR+')})`))
        }
        $('#external-links').html(`<div>${externalLinksLine1.join('')}</div><div style="margin-top: 5px;">${externalLinksLine2.join('')}</div>`)

        // --- Phenotype Summary ---
        if (row['LLM_phenotype_summary']) {
            $('#phenotype-summary-section').html(`
                <div class="source-section">
                    <h4>Phenotype Summary:<i class="question circle outline icon" style="margin-left: 10px;" data-html="This is an AI summary of the phenotype descriptions from the sources listed below. It was generated using Gemini 2.5 Flash." data-position="top left"></i></h4>
                    <div class="phenotype-summary-card">${row['LLM_phenotype_summary']}</div>
                </div>
            `)
        }

        // --- Source: OMIM ---
        // OMIM phenotype MIM #, inheritance, and phenotype description are intentionally not shown
        // to avoid redistributing OMIM's licensed content. Only the gene MIM # (a numeric identifier
        // linking to omim.org) is displayed.
        if (hasAnyValue(row['OMIM_mim_number'])) {
            const mimNumbersList = dedupSemicolonArray(row['OMIM_mim_number'])
            const omimTitle = mimNumbersList.length > 0
                ? `<a href="https://omim.org/entry/${mimNumbersList[0]}" target="_blank" class="action-link">OMIM</a>`
                : 'OMIM'
            let html = `<div class="source-section"><h4>${omimTitle}<span style="color: #999; font-size: calc(1em - 2px); margin-left: 15px;">(last updated: 2026-06-08)</span></h4><table class="locus-info-table">`
            const mimLinks = mimNumbersList.map(m =>
                `<a href="https://omim.org/entry/${m}" target="_blank" class="action-link">${m}</a>`
            ).join('; ')
            html += `<tr><td class="locus-info-label">MIM #:</td><td>${mimLinks}</td></tr>`
            html += '</table></div>'
            $('#source-omim').html(html)
        }

        // --- Source: ClinGen ---
        if (hasAnyValue(row['CLINGEN_disease_label'], row['CLINGEN_disease_mondo_id'], row['CLINGEN_inheritance'], row['CLINGEN_classification'], row['CLINGEN_haploinsufficient'])) {
            const clingenTitle = hgncId
                ? `<a href="https://search.clinicalgenome.org/kb/genes/${encodeURIComponent(hgncId)}" target="_blank" class="action-link">ClinGen</a>`
                : 'ClinGen'
            let html = `<div class="source-section"><h4>${clingenTitle}</h4><table class="locus-info-table">`
            html += `<tr><td class="locus-info-label">Disease:</td><td style="white-space: normal;">${dedupSemicolon(row['CLINGEN_disease_label'])}</td></tr>`
            const mondoLinks = dedupSemicolonArray(row['CLINGEN_disease_mondo_id']).map(id =>
                `<a href="https://monarchinitiative.org/${id}" target="_blank" class="action-link">${id}</a>`
            ).join('; ')
            html += `<tr><td class="locus-info-label">MONDO ID:</td><td>${mondoLinks}</td></tr>`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${dedupSemicolon(row['CLINGEN_inheritance'])}</td></tr>`
            // Classification badge
            const classParts = dedupSemicolonArray(row['CLINGEN_classification'])
            const classVal = classParts.join('; ')
            if (classVal) {
                const classColors = { 'Definitive': '#28a745', 'Strong': '#218838', 'Moderate': '#ffc107', 'Limited': '#fd7e14' }
                const classRank = { 'Definitive': 0, 'Strong': 1, 'Moderate': 2, 'Limited': 3 }
                const highest = classParts.reduce((best, p) => (
                    classRank[p] !== undefined && (best === null || classRank[p] < classRank[best]) ? p : best
                ), null)
                const color = (highest && classColors[highest]) || '#6c757d'
                const classBadge = `<span class="ui mini label" style="background-color: ${color}; color: white;">${classVal}</span>`
                const classPopup = `<div style='white-space: nowrap;'>ClinGen disease validity classification<br /><br />Click to visit ClinGen.</div>`
                const classLink = hgncId
                    ? `<a href="https://search.clinicalgenome.org/kb/genes/${encodeURIComponent(hgncId)}" target="_blank" style="text-decoration: none;" class="source-hover-popup" data-html="${classPopup}">${classBadge}</a>`
                    : `<span class="source-hover-popup" data-html="${classPopup}">${classBadge}</span>`
                html += `<tr><td class="locus-info-label">Classification:</td><td>${classLink}</td></tr>`
            }
            html += `<tr><td class="locus-info-label">Haploinsufficiency:</td><td>${dedupSemicolon(row['CLINGEN_haploinsufficient'])}</td></tr>`
            html += '</table></div>'
            $('#source-clingen').html(html)
        }

        // --- Source: GenCC ---
        if (hasAnyValue(row['GENCC_disease_name'], row['GENCC_classification'], row['GENCC_inheritance'])) {
            const genccTitle = hgncId
                ? `<a href="https://search.thegencc.org/genes/${encodeURIComponent(hgncId)}" target="_blank" class="action-link">GenCC</a>`
                : 'GenCC'
            let html = `<div class="source-section"><h4>${genccTitle}</h4><table class="locus-info-table">`
            html += `<tr><td class="locus-info-label">Disease:</td><td style="white-space: normal;">${dedupSemicolon(row['GENCC_disease_name'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Classification:</td><td>${dedupSemicolon(row['GENCC_classification'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${dedupSemicolon(row['GENCC_inheritance'])}</td></tr>`
            html += '</table></div>'
            $('#source-gencc').html(html)
        }

        // --- Source: PanelApp UK ---
        if (hasAnyValue(row['PANEL_APP_UK_confidence'], row['PANEL_APP_UK_penetrance'], row['PANEL_APP_UK_mode_of_pathogenicity'], row['PANEL_APP_UK_inheritance'], row['PANEL_APP_UK_evidence'], row['PANEL_APP_UK_phenotypes'], row['PANEL_APP_UK_panel_name'])) {
            const panelAppUkTitle = geneSymbol
                ? `<a href="https://panelapp.genomicsengland.co.uk/panels/entities/${encodeURIComponent(geneSymbol)}" target="_blank" class="action-link">PanelApp UK</a>`
                : 'PanelApp UK'
            let html = `<div class="source-section"><h4>${panelAppUkTitle}</h4><table class="locus-info-table">`
            html += `<tr><td class="locus-info-label">Confidence:</td><td>${dedupSemicolon(row['PANEL_APP_UK_confidence'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Penetrance:</td><td>${dedupSemicolon(row['PANEL_APP_UK_penetrance'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Pathogenicity:</td><td>${dedupSemicolon(row['PANEL_APP_UK_mode_of_pathogenicity'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${dedupSemicolon(row['PANEL_APP_UK_inheritance'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Evidence:</td><td style="white-space: normal;">${dedupSemicolon(row['PANEL_APP_UK_evidence'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Phenotypes:</td><td style="white-space: normal;">${dedupSemicolon(row['PANEL_APP_UK_phenotypes'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Panel:</td><td style="white-space: normal;">${dedupSemicolon(row['PANEL_APP_UK_panel_name'])}</td></tr>`
            html += '</table></div>'
            $('#source-panelapp-uk').html(html)
        }

        // --- Source: PanelApp AU ---
        if (hasAnyValue(row['PANEL_APP_AU_confidence'], row['PANEL_APP_AU_penetrance'], row['PANEL_APP_AU_mode_of_pathogenicity'], row['PANEL_APP_AU_inheritance'], row['PANEL_APP_AU_evidence'], row['PANEL_APP_AU_phenotypes'], row['PANEL_APP_AU_panel_name'])) {
            const panelAppAuTitle = geneSymbol
                ? `<a href="https://panelapp-aus.org/panels/entities/${encodeURIComponent(geneSymbol)}" target="_blank" class="action-link">PanelApp AU</a>`
                : 'PanelApp AU'
            let html = `<div class="source-section"><h4>${panelAppAuTitle}</h4><table class="locus-info-table">`
            html += `<tr><td class="locus-info-label">Confidence:</td><td>${dedupSemicolon(row['PANEL_APP_AU_confidence'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Penetrance:</td><td>${dedupSemicolon(row['PANEL_APP_AU_penetrance'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Pathogenicity:</td><td>${dedupSemicolon(row['PANEL_APP_AU_mode_of_pathogenicity'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${dedupSemicolon(row['PANEL_APP_AU_inheritance'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Evidence:</td><td style="white-space: normal;">${dedupSemicolon(row['PANEL_APP_AU_evidence'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Phenotypes:</td><td style="white-space: normal;">${dedupSemicolon(row['PANEL_APP_AU_phenotypes'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Panel:</td><td style="white-space: normal;">${dedupSemicolon(row['PANEL_APP_AU_panel_name'])}</td></tr>`
            html += '</table></div>'
            $('#source-panelapp-au').html(html)
        }

        // --- Source: Decipher ---
        if (hasAnyValue(row['DECIPHER_inheritance'], row['DECIPHER_disease_names'])) {
            const decipherTitle = geneId
                ? `<a href="https://www.deciphergenomics.org/gene/${encodeURIComponent(geneId)}/overview/protein-genomic-info" target="_blank" class="action-link">Decipher</a>`
                : 'Decipher'
            let html = `<div class="source-section"><h4>${decipherTitle}</h4><table class="locus-info-table">`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${dedupSemicolon(row['DECIPHER_inheritance'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Disease Names:</td><td style="white-space: normal;">${dedupSemicolon(row['DECIPHER_disease_names'])}</td></tr>`
            html += '</table></div>'
            $('#source-decipher').html(html)
        }

        // --- Source: ClinVar ---
        if (hasAnyValue(row['CLINVAR_phenotypes'], row['CLINVAR_clinical_significance'], row['CLINVAR_stars'], row['CLINVAR_variant_consequences'])) {
            const clinvarTitle = geneSymbol
                ? `<a href="${SOURCES.ClinVar.url({ geneSymbol })}" target="_blank" class="action-link">ClinVar</a>`
                : 'ClinVar'
            let html = `<div class="source-section"><h4>${clinvarTitle}</h4><table class="locus-info-table">`
            html += `<tr><td class="locus-info-label">Phenotypes:</td><td style="white-space: normal;">${dedupSemicolon(row['CLINVAR_phenotypes'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Clinical Significance:</td><td>${dedupSemicolon(row['CLINVAR_clinical_significance'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Stars:</td><td>${row['CLINVAR_stars'] != null ? row['CLINVAR_stars'] : ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Variant Consequences:</td><td>${dedupSemicolon(row['CLINVAR_variant_consequences'])}</td></tr>`
            html += '</table></div>'
            $('#source-clinvar').html(html)
        }

        // --- Source: Fridman ---
        if (hasAnyValue(row['FRIDMAN_omim_phenotype_id'], row['FRIDMAN_phenotype_category'], row['FRIDMAN_inheritance'])) {
            let html = '<div class="source-section"><h4><a href="https://pubmed.ncbi.nlm.nih.gov/40374730/" target="_blank" class="action-link">Fridman et al 2025</a></h4><table class="locus-info-table">'
            html += `<tr><td class="locus-info-label">OMIM Phenotype ID:</td><td>${dedupSemicolon(row['FRIDMAN_omim_phenotype_id'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Phenotype Category:</td><td>${dedupSemicolon(row['FRIDMAN_phenotype_category'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${dedupSemicolon(row['FRIDMAN_inheritance'])}</td></tr>`
            html += '</table></div>'
            $('#source-fridman').html(html)
        }

        // --- Source: dbNSFP ---
        if (hasAnyValue(row['DBNSFP_orphanet_disorder'], row['DBNSFP_function_description'], row['DBNSFP_disease_description'], row['DBNSFP_hpo_name'], row['DBNSFP_mgi_mouse_phenotype'], row['DBNSFP_zfin_zebrafish_phenotype'])) {
            let html = '<div class="source-section"><h4>dbNSFP</h4><table class="locus-info-table">'
            html += `<tr><td class="locus-info-label">Orphanet Disorder:</td><td style="white-space: normal;">${dedupSemicolon(row['DBNSFP_orphanet_disorder'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Function:</td><td style="white-space: normal;">${dedupSemicolon(row['DBNSFP_function_description'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Disease:</td><td style="white-space: normal;">${dedupSemicolon(row['DBNSFP_disease_description'])}</td></tr>`
            html += `<tr><td class="locus-info-label">HPO Terms:</td><td style="white-space: normal;">${dedupSemicolon(row['DBNSFP_hpo_name'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Mouse Phenotype:</td><td style="white-space: normal;">${dedupSemicolon(row['DBNSFP_mgi_mouse_phenotype'])}</td></tr>`
            html += `<tr><td class="locus-info-label">Zebrafish Phenotype:</td><td style="white-space: normal;">${dedupSemicolon(row['DBNSFP_zfin_zebrafish_phenotype'])}</td></tr>`
            html += '</table></div>'
            $('#source-dbnsfp').html(html)
        }

        // Hide grid rows whose source section has no rendered content so they don't add vertical space
        const sourceSectionIds = ['phenotype-summary-section', 'source-omim', 'source-clingen', 'source-gencc',
            'source-panelapp-uk', 'source-panelapp-au', 'source-decipher', 'source-clinvar',
            'source-fridman', 'source-dbnsfp']
        sourceSectionIds.forEach(id => {
            const $div = $(`#${id}`)
            $div.closest('.ui.row').toggle($div.children().length > 0)
        })

        $('.question').popup({ on: 'click' })
        $('.show-popup').popup({
            on: 'click',
            hoverable: true,
            onVisible: function() {
                const $popup = $(this).popup('get popup')
                if ($popup && $popup.length) initSourceBadgePopups($popup)
            },
        })
        initSourceBadgePopups()
    }

    const performSearch = async () => {
        $('#error-message').hide()

        try {
            $('body').css('cursor', 'wait')

            const hgncGeneId = GLOBAL_PAGE_STATE['hgnc_gene_id']
            const ensgGeneId = GLOBAL_PAGE_STATE['ensembl_gene_id']
            if (!hgncGeneId && !ensgGeneId) {
                displayError('Missing gene identifier in URL (eg. #hgnc_gene_id=HGNC:1100 or #ensembl_gene_id=ENSG00000139618)')
                return
            }

            // Set page title immediately with whatever identifier we have
            const lookupId = hgncGeneId || ensgGeneId
            document.title = `Gene Lookup: ${lookupId}`
            $('#locus-page-title').text(`Gene Page: ${lookupId}`)

            let query
            if (hgncGeneId) {
                query = `SELECT * FROM ${COMPLETE_TABLE_ID} WHERE hgnc_gene_id = '${escapeSqlString(hgncGeneId)}'`
            } else {
                query = `SELECT * FROM ${COMPLETE_TABLE_ID} WHERE ensembl_gene_id = '${escapeSqlString(ensgGeneId)}'`
            }

            window.searchResults = await queryBigQuery(query, 0, 1, null)

            console.log("Search results:", window.searchResults)

            if (!window.searchResults.rows || window.searchResults.rows.length === 0) {
                console.error("ERROR: gene not found", lookupId)
                displayError(`Gene not found: ${lookupId}`)
                return
            }

            displaySearchResults()

            // Initialize IGV with gene coordinates if not already set by URL
            const row = window.searchResults.rows[0]
            if (row['gene_chrom'] && row['gene_start'] != null && row['gene_end'] != null) {
                const igvStart = Math.max(0, row['gene_start'] - IGV_LOCUS_PADDING)
                const igvEnd = row['gene_end'] + IGV_LOCUS_PADDING
                if (GLOBAL_PAGE_STATE['igvLoc'] === DEFAULT_GLOBAL_PAGE_STATE['igvLoc']) {
                    GLOBAL_PAGE_STATE['igvLoc'] = `${row['gene_chrom']}:${igvStart}-${igvEnd}`
                }
            }

        } catch (error) {
            console.error('Error performing search:', error)
            displayError('Error performing search: ' + error.message)
        } finally {
            $('body').css('cursor', 'default')
        }
    }

    // Initialize modals
    ['about', 'faq'].forEach(prefix => {
        $(`#${prefix}-link`).click((e) => {
            e.preventDefault()
            $(`#${prefix}-modal`).modal('show')
        })
    })

    // Handle browser forward & back buttons
    window.addEventListener('popstate', readAndApplyPersistentPageStateFromUrl)

    // Init UI elements
    $('.ui.button').popup()
    $(".ui.checkbox").checkbox()

    $(document).ready(async () => {
        await readAndApplyPersistentPageStateFromUrl()
        console.log("Done initializing page. GLOBAL_PAGE_STATE:", GLOBAL_PAGE_STATE)
        $('body').css('cursor', 'default')
    })

</script>

</body>
</html>
