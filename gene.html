<script>
    /** --------- START of utils for IGV.js  ---------- */

    const generateIgvConfig = (addSelectedTracks) => {

        // specify IGV tracks and the data to display in them
        const tracks = []

        if (addSelectedTracks) {
            tracks.push({
                name: "Refseq",
                format: "refgene",
                url: `${REFERENCE_BASE_URL}/ncbiRefSeq.txt.gz`,
                indexed: true,
                indexURL: `${REFERENCE_BASE_URL}/ncbiRefSeq.txt.gz.tbi`,
                infoURL: "https://www.ncbi.nlm.nih.gov/gene/?term=$$",
                height: 150,
            })

            ALL_AVAILABLE_TRACKS.forEach((rt) => {
                const trackName = rt[0]
                const trackDisplayName = rt[1]
                const trackURL = rt[2]
                if (!GLOBAL_PAGE_STATE[trackName]) {
                    return
                }

                if (trackName == 'igv_gencode') {
                    tracks.push({
                        name: trackDisplayName,
                        format: 'refgene',
                        url: trackURL,
                        indexURL: `${trackURL}.tbi`,
                        indexed: true,
                        searchable: true,
                        height: 350,
                        visibilityWindow: -1,
                        displayMode: 'EXPANDED',
                        color: 'rgb(76,171,225)',
                    })
                } else if (trackURL.endsWith('.bed.gz')) {
                    tracks.push({
                        format: 'bed',
                        name: trackDisplayName,
                        url: trackURL,
                        indexURL: `${trackURL}.tbi`,
                        indexed: true,
                        searchable: false,
                        displayMode: 'EXPANDED',
                    })
                } else if (trackURL.endsWith('.gtf.gz')) {
                    tracks.push({
                        format: 'gtf',
                        name: trackDisplayName,
                        url: trackURL,
                        indexed: true,
                        searchable: false,
                        displayMode: 'EXPANDED',
                    })
                } else {
                    tracks.push({
                        name: trackDisplayName,
                        url: trackURL,
                    })
                }

            })

            // Add custom tracks if they have URLs
            for (let i = 1; i <= 3; i++) {
                const url = GLOBAL_PAGE_STATE[`igv_custom_track_url_${i}`]
                if (url && url.trim() !== '') {
                    tracks.push({
                        name: url.split('/').pop(),
                        url: url.trim()
                    })
                }
            }
        }

        const reference = {
            "id": "hg38",
            "name": "Human (GRCh38/hg38)",
            "fastaURL": "https://igv-genepattern-org.s3.amazonaws.com/genomes/seq/hg38/hg38.fa",
            "indexURL": "https://igv-genepattern-org.s3.amazonaws.com/genomes/seq/hg38/hg38.fa.fai",
            "cytobandURL": "https://s3.amazonaws.com/igv.org.genomes/hg38/annotations/cytoBandIdeo.txt.gz",
            "aliasURL": "https://s3.amazonaws.com/igv.org.genomes/hg38/hg38_alias.tab",
            "chromosomeOrder": "chr1, chr2, chr3, chr4, chr5, chr6, chr7, chr8, chr9, chr10, chr11, chr12, chr13, chr14, chr15, chr16, chr17, chr18, chr19, chr20, chr21, chr22, chrX, chrY",
            "tracks": tracks,
        }

        const locus = GLOBAL_PAGE_STATE['igvLoc']
        return {
            reference: reference,
            showCursorTrackingGuide: true,
            minimumBases: 40,  //required for https://github.com/igvteam/igv.js/issues/2046
            locus: locus,
        }
    }

    async function updateIgv() {

        // create igv.js browser object if it hasn't been created yet
        if (!window.igvBrowser) {
            const config = generateIgvConfig(false)
            window.igvBrowser = await igv.createBrowser(document.getElementById("igv-viewport"), config)

            window.igvBrowser.on('trackremoved', (track) => {
                // get the track id that matches the url
                ALL_AVAILABLE_TRACKS.forEach((rt) => {
                    if (track.url === rt[2]) {
                        const trackName = rt[0]
                        $(`input[name="${trackName}"]`).prop('checked', false)
                        GLOBAL_PAGE_STATE[trackName] = 0
                        writePersistentPageStateToUrl()
                    }
                })
            })

            window.igvBrowser.on('locuschange', (locus) => {
                if (locus[0] && locus[0].chr && locus[0].start && locus[0].end) {
                    GLOBAL_PAGE_STATE['igvLoc'] = `${locus[0].chr}:${parseInt(locus[0].start)}-${parseInt(locus[0].end)}`
                    writePersistentPageStateToUrl()
                }
            })

            // add the IGV tracks selection button
            $($('#igv-viewport')[0].shadowRoot).find('.igv-navbar-left-container').after(
                `<button id="igv-select-tracks-button" class="ui primary basic button" style="height:25px; padding:2px 15px 2px 30px; border-color:#06359d !important; border-width: 1px !important; border-radius:5px; color:#06359d !important; background-color: white !important; cursor: pointer;">
               Select IGV Tracks
               <i class="setting icon" style="margin-left:10px" />
            </button>`
            )

            $('#igv-reference-tracks-checkboxes').html($('#igv-reference-tracks-checkboxes').html() +
                `<tr><td>` +
                REFERENCE_TRACKS.map((rt) => `
                <div class="ui checkbox igv-track-checkbox"><input type="checkbox" name="${rt[0]}" ${GLOBAL_PAGE_STATE[rt[0]] ? 'checked' : ''}><label>${rt[1]}</label></div>
            `).join(' ')
                + `</td></tr>`
            )

            $('#igv-custom-tracks').html($('#igv-custom-tracks').html() +
                `<tr>
                <td colspan="2">
                    <input type="text" style="margin-bottom: 10px; width:100%;" class="igv-custom-track-url" id="igv-custom-track-url-1" placeholder="Enter a public data file URL for custom track #1. It can be an indexed BED, BAM, VCF, or other file format supported by IGV.js" />
                    <input type="text" style="margin-bottom: 10px; width:100%;" class="igv-custom-track-url" id="igv-custom-track-url-2" placeholder="Enter a public data file URL for custom track #2. It can be an indexed BED, BAM, VCF, or other file format supported by IGV.js" />
                    <input type="text" style="margin-bottom: 10px; width:100%;" class="igv-custom-track-url" id="igv-custom-track-url-3" placeholder="Enter a public data file URL for custom track #3. It can be an indexed BED, BAM, VCF, or other file format supported by IGV.js" />
                </td>
            </tr>`
            )

            $(".ui.checkbox").checkbox()

            $($('#igv-viewport')[0].shadowRoot).find('#igv-select-tracks-button').click(() => {
                ALL_AVAILABLE_TRACKS.forEach((rt) => {
                    const trackName = rt[0]
                    const isChecked = GLOBAL_PAGE_STATE[trackName] === 1
                    $(`input[name="${trackName}"]`).prop('checked', isChecked)
                })

                $('#igv-track-selection-dialog').modal('show')
                $('.question').popup({ on: 'click' })
            })
            $('#igv-tracks-modal-apply-button').click(async() => {
                // update GLOBAL_PAGE_STATE with selected tracks
                ALL_AVAILABLE_TRACKS.forEach((rt) => {
                    const trackName = rt[0]
                    const isChecked = $(`input[name="${trackName}"]`).is(':checked')
                    GLOBAL_PAGE_STATE[trackName] = isChecked ? 1 : 0
                })

                // update custom track URLs
                for (let i = 1; i <= 3; i++) {
                    const url = $(`#igv-custom-track-url-${i}`).val()
                    GLOBAL_PAGE_STATE[`igv_custom_track_url_${i}`] = url || ''
                }

                writePersistentPageStateToUrl()
                await updateIgv()
            })
        }

        if (GLOBAL_PAGE_STATE['showIGV'] === 1) {
            const igvConfig = generateIgvConfig(true)

            console.log("Updating igv config to", igvConfig)
            await window.igvBrowser.loadSessionObject(igvConfig)
        }
    }
    /** --------- END of utils for IGV.js  ---------- */
</script>

<script>

    // BigQuery config
    const PROJECT_ID = 'cmg-analysis'
    const COMPLETE_TABLE_ID = `\`cmg-analysis.gene_lookup.combined_gene_disease_association_table\``

    const SHOW_COLUMNS_VALUE_DELIMITER = ','

    const IGV_LOCUS_PADDING = 5000

    const REFERENCE_REGION_REGEXP = /^[\s]*(?:chr)?([XYMTt0-9]+):([\d,]+)[\p{Dash_Punctuation}]([\d,]+)[\s]*$/iu
    const CHROM_TO_CHROM_INDEX = {
        "X":  23, "chrX": 23,
        "Y":  24, "chrY": 24,
        "MT": 25, "M": 25, "chrMT": 25, "chrM": 25,
    }
    for (let i = 1; i <= 22; i++) {
        CHROM_TO_CHROM_INDEX[`${i}`] = i
        CHROM_TO_CHROM_INDEX[`chr${i}`] = i

            console.log("Page state:", GLOBAL_PAGE_STATE)
            console.log(exportToFileFormat ? `Exporting to ${exportToFileFormat}:`: `Sending query:`, query.replace(/[\n\r\s]+/g, ' '))
            const requestBody = {
                sql: query,
                export_to_file_format: exportToFileFormat,
                start_index: startIndex,
                page_size: pageSize,
            }

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody),
            })

            if (!response.ok) {
                throw new Error(`BigQuery API error: ${response.status} ${response.statusText}`)
            }

    /**
     * Build a WHERE clause for a search query.
     * Supports: gene name/alias, HGNC ID, Ensembl gene ID, genomic region, disease/phenotype text,
     * and comma-separated lists of the above.
     */
    const buildSearchWhereClause = (rawQuery) => {
        if (!rawQuery || !rawQuery.trim()) return ''

        // Check for comma-separated list of queries
        const queries = rawQuery.split(',').map(q => q.trim()).filter(q => q)
        if (queries.length > 1) {
            const clauses = queries.map(q => buildSingleSearchWhereClause(q)).filter(c => c)
            if (clauses.length === 0) return ''
            return `(${clauses.join(' OR ')})`
        }

        return buildSingleSearchWhereClause(rawQuery.trim())
    }

    const buildSingleSearchWhereClause = (q) => {
        if (!q) return ''

        // Genomic region: chr1:12345-67890
        const regionMatch = q.match(REFERENCE_REGION_REGEXP)
        if (regionMatch) {
            const chrom = regionMatch[1].startsWith('chr') ? regionMatch[1] : `chr${regionMatch[1]}`
            const start = parseInt(regionMatch[2].replace(/,/g, ''))
            const end = parseInt(regionMatch[3].replace(/,/g, ''))
            return `(chrom = '${chrom}' AND start < ${end} AND end > ${start})`
        }

        // HGNC gene ID: HGNC:1234
        if (/^HGNC:\d+$/i.test(q)) {
            return `(UPPER(hgnc_gene_id) = UPPER('${q}'))`
        }

        // Ensembl gene ID: ENSG00000000001
        if (/^ENSG\d+/i.test(q)) {
            return `(UPPER(gene_id) = UPPER('${q}'))`
        }

        // Gene name/alias (short alphanumeric tokens that look like gene symbols)
        if (/^[A-Za-z0-9\-]+$/.test(q) && q.length <= 30) {
            return `(UPPER(gene_symbol) = UPPER('${q}') OR UPPER(gene_aliases) LIKE UPPER('%${q}%'))`
        }

        // Otherwise treat as disease/phenotype free-text search
        const phenotypeColumns = [
            'LLM_phenotype_summary',
            'OMIM_phenotype_description',
            'CLINGEN_disease_label',
            'GENCC_disease_name',
            'PANEL_APP_UK_phenotypes',
            'PANEL_APP_AU_phenotypes',
            'DECIPHER_disease_names',
            'CLINVAR_phenotypes',
        ]
        const textClauses = phenotypeColumns.map(col => `UPPER(${col}) LIKE UPPER('%${q}%')`)
        return `(${textClauses.join(' OR ')})`
    }

    /**
     * Build a WHERE clause for custom filters.
     * Custom filters are stored in GLOBAL_PAGE_STATE.customFilters as "col|op|val,col|op|val"
     */
    const buildCustomFiltersWhereClause = () => {
        const filtersStr = GLOBAL_PAGE_STATE.customFilters
        if (!filtersStr || !filtersStr.trim()) return ''

        const clauses = []
        for (const filterStr of filtersStr.split(',')) {
            const parts = filterStr.split('|')
            if (parts.length !== 3) continue

            const [col, op, val] = parts

            // Validate column name exists in TABLE_COLUMNS or BIGQUERY_COLUMN_DESCRIPTIONS
            if (!BIGQUERY_COLUMN_DESCRIPTIONS[col] && !TABLE_COLUMNS[col]) continue

            // Build SQL clause based on operator
            switch (op) {
                case 'eq':
                    clauses.push(`${col} = '${val}'`)
                    break
                case 'neq':
                    clauses.push(`${col} != '${val}'`)
                    break
                case 'gt':
                    clauses.push(`${col} > ${val}`)
                    break
                case 'gte':
                    clauses.push(`${col} >= ${val}`)
                    break
                case 'lt':
                    clauses.push(`${col} < ${val}`)
                    break
                case 'lte':
                    clauses.push(`${col} <= ${val}`)
                    break
                case 'contains':
                    clauses.push(`UPPER(${col}) LIKE UPPER('%${val}%')`)
                    break
                case 'not_contains':
                    clauses.push(`(${col} IS NULL OR UPPER(${col}) NOT LIKE UPPER('%${val}%'))`)
                    break
                case 'is_null':
                    clauses.push(`${col} IS NULL`)
                    break
                case 'is_not_null':
                    clauses.push(`${col} IS NOT NULL`)
                    break
            }
        }

        return clauses.join(' AND ')
    }

    /**
     * Build the complete SQL query for the current search + filters + sort + pagination.
     */
    const buildSearchQuery = (selectColumns) => {
        const whereClauses = []

        // Search query
        const searchClause = buildSearchWhereClause(GLOBAL_PAGE_STATE.searchQuery)
        if (searchClause) whereClauses.push(searchClause)

        // Custom filters
        const customClause = buildCustomFiltersWhereClause()
        if (customClause) whereClauses.push(customClause)

        const whereStr = whereClauses.length > 0 ? `WHERE ${whereClauses.join(' AND ')}` : ''

        // Sort
        const sortColumn = GLOBAL_PAGE_STATE.sc || DEFAULT_SORT_COLUMN
        const sortDirection = GLOBAL_PAGE_STATE.sd || DEFAULT_SORT_DIRECTION

        // Build sort expression from the TABLE_COLUMNS definition
        let sortExpression = sortColumn
        if (TABLE_COLUMNS[sortColumn] && TABLE_COLUMNS[sortColumn].getSortColumns) {
            sortExpression = TABLE_COLUMNS[sortColumn].getSortColumns().join(` ${sortDirection}, `)
        }

        const query = `SELECT ${selectColumns} FROM ${COMPLETE_TABLE_ID} ${whereStr} ORDER BY ${sortExpression} ${sortDirection}`
        return query
    }

    /**
     * Perform the search: build query, send to BigQuery, return results.
     */
    const performSearch = async () => {
        // Gather all required columns from visible TABLE_COLUMNS
        const visibleColumns = getVisibleColumns()
        const requiredColumnsSet = new Set()
        for (const colKey of visibleColumns) {
            if (TABLE_COLUMNS[colKey] && TABLE_COLUMNS[colKey].getRequiredColumns) {
                for (const rc of TABLE_COLUMNS[colKey].getRequiredColumns()) {
                    requiredColumnsSet.add(rc)
                }
            }
        }

        const selectColumns = requiredColumnsSet.size > 0 ? Array.from(requiredColumnsSet).join(', ') : '*'

        const startIndex = (GLOBAL_PAGE_STATE.currentPage - 1) * GLOBAL_PAGE_STATE.pageSize
        const query = buildSearchQuery(selectColumns)

        return await queryBigQuery(query, startIndex, GLOBAL_PAGE_STATE.pageSize)
    }

    /**
     * Get the list of currently visible column keys based on GLOBAL_PAGE_STATE.
     * Default visible columns if none specified.
     */
    const DEFAULT_VISIBLE_COLUMNS = [
        'gene_symbol',
        'disease_category',
        'inheritance',
        'sources',
        'LLM_phenotype_summary',
        'pLI_v4',
        'lof_oe_ci_upper_v4',
        'CLINGEN_classification',
    ]

    const getVisibleColumns = () => {
        if (GLOBAL_PAGE_STATE.showColumns) {
            return GLOBAL_PAGE_STATE.showColumns.split(SHOW_COLUMNS_VALUE_DELIMITER).filter(c => c)
        }
        return DEFAULT_VISIBLE_COLUMNS
    }

</script>

                <a id="back-to-search-link" href="index.html" style="font-size: 1.1em; white-space: nowrap;">&lt; Back to search page</a>
                <div id="locus-page-title" style="flex: 1; text-align: center; font-size: 1.3em; font-weight: 600;"></div>
                <div style="width: 140px;"></div>
            </div>
            <div class="two wide column"></div>
        </div>
    `)

    $('body').css('cursor', 'wait')

    // Gene page-specific settings of the DEFAULT_GLOBAL_PAGE_STATE
    DEFAULT_GLOBAL_PAGE_STATE['hgnc_gene_id'] = ''
    DEFAULT_GLOBAL_PAGE_STATE['gene_id'] = ''

    let GLOBAL_PAGE_STATE = JSON.parse(JSON.stringify(DEFAULT_GLOBAL_PAGE_STATE))

    const readAndApplyPersistentPageStateFromUrl = async () => {
        GLOBAL_PAGE_STATE = JSON.parse(JSON.stringify(DEFAULT_GLOBAL_PAGE_STATE))

        const urlArgs = window.location.hash.substring(1)
        if (!urlArgs) return

        const params = new URLSearchParams(urlArgs)
        for (const [urlKey, value] of params.entries()) {
            const key = URL_PARAM_REVERSE_ALIASES[urlKey] || urlKey
            if (key in DEFAULT_GLOBAL_PAGE_STATE && value != null) {
                GLOBAL_PAGE_STATE[key] = value === 'true' ? true :
                                        value === 'false' ? false :
                                        !isNaN(value) ? Number(value) : value
            }
        }
        // hgnc_gene_id contains a colon (e.g. "HGNC:1100") so it gets parsed as NaN — force it back to a string
        if (params.has('hgnc_gene_id')) {
            GLOBAL_PAGE_STATE['hgnc_gene_id'] = params.get('hgnc_gene_id')
        }
        // gene_id (ENSG...) may also be parsed incorrectly — force it back to a string
        if (params.has('gene_id')) {
            GLOBAL_PAGE_STATE['gene_id'] = params.get('gene_id')
        }

        console.log("Starting to initialize page. GLOBAL_PAGE_STATE:", GLOBAL_PAGE_STATE)

        // igv
        if (GLOBAL_PAGE_STATE['showIGV'] === 1) {
            $('#igv-row').show()
            $('#show-igv-divider-text').hide()
            $('#hide-igv-divider-text').show()
            await updateIgv()
        }

        // Restore custom track URLs
        for (let i = 1; i <= 3; i++) {
            $(`#igv-custom-track-url-${i}`).val(GLOBAL_PAGE_STATE[`igv_custom_track_url_${i}`] || '')
        }

        await performSearch()
    }

    $('#show-igv-divider').click(async () => {
        GLOBAL_PAGE_STATE['showIGV'] = (GLOBAL_PAGE_STATE['showIGV'] === 1) ? 0 : 1
        writePersistentPageStateToUrl()

        if (GLOBAL_PAGE_STATE['showIGV'] === 1) {
            $('#igv-row').show()
            $('#show-igv-divider-text').hide()
            $('#hide-igv-divider-text').show()
            await updateIgv()
        } else {
            $('#igv-row').slideUp(500, () => {
                $('#hide-igv-divider-text').hide()
                $('#show-igv-divider-text').show()
            })
        }
    })

    const displayError = (message) => {
        $('#error-text').text(message)
        $('#error-message').show()
    }

    const hasAnyValue = (...values) => values.some(v => v != null && v !== '')

    const displaySearchResults = () => {
        const row = window.searchResults.rows[0]

        const geneSymbol = row['gene_symbol'] || ''
        const hgncId = row['hgnc_gene_id'] || ''
        const geneId = row['gene_id'] || ''
        const displayName = geneSymbol || hgncId || geneId || 'Unknown'
        const chrom = row['chrom'] || ''
        const start = row['start']
        const end = row['end']
        const coordinates = (chrom && start != null && end != null) ? `${chrom}:${start.toLocaleString()}-${end.toLocaleString()}` : ''

        // Set page title
        document.title = `Gene Lookup: ${displayName}`
        $('#locus-page-title').text(`Gene Page: ${displayName}`)

        // Update back link
        const urlArgs = window.location.hash.substring(1)
        $('#back-to-search-link').attr('href', `index.html#${urlArgs}`)

        // --- Left column (row1-box1) ---
        let box1 = '<table class="locus-info-table">'
        box1 += `<tr><td class="locus-info-label">Gene Symbol:</td><td style="font-weight: bold; font-size: 1.1em;">${geneSymbol}</td></tr>`
        box1 += `<tr><td class="locus-info-label">HGNC ID:</td><td>${hgncId ? `<a href="https://www.genenames.org/data/gene-symbol-report/#!/hgnc_id/${hgncId}" target="_blank" class="action-link">${hgncId}</a>` : ''}</td></tr>`
        box1 += `<tr><td class="locus-info-label">Gene ID:</td><td>${geneId ? `<a href="https://ensembl.org/Homo_sapiens/Gene/Summary?g=${geneId}" target="_blank" class="action-link">${geneId}</a>` : ''}</td></tr>`
        box1 += `<tr><td class="locus-info-label">Aliases:</td><td>${row['gene_aliases'] || ''}</td></tr>`
        box1 += `<tr><td class="locus-info-label">Coordinates (hg38):</td><td>${coordinates}</td></tr>`
        box1 += `<tr><td class="locus-info-label">Disease Category:</td><td>${getDiseaseCategory(row['disease_category'])}</td></tr>`
        box1 += '</table>'
        $('#locus-page-row1-box1').html(box1)

        // --- Right column (row1-box2) ---
        let box2 = '<table class="locus-info-table">'
        box2 += `<tr><td class="locus-info-label">Inheritance:</td><td>${row['inheritance'] || ''}</td></tr>`
        box2 += `<tr><td class="locus-info-label">Sources:</td><td>${getSourcesBadges(row['sources'])}</td></tr>`

        // Constraint scores
        const pliV2 = row['pLI_v2'] != null ? row['pLI_v2'].toFixed(2) : ''
        const pliV4 = row['pLI_v4'] != null ? (() => { const v = row['pLI_v4']; const s = v >= 0.9 ? 'color: #c0392b; font-weight: bold;' : ''; return `<span style="${s}">${v.toFixed(2)}</span>` })() : ''
        const loeuf = row['lof_oe_ci_upper_v4'] != null ? (() => { const v = row['lof_oe_ci_upper_v4']; const s = v <= 0.35 ? 'color: #c0392b; font-weight: bold;' : ''; return `<span style="${s}">${v.toFixed(2)}</span>` })() : ''
        const moeuf = row['mis_oe_ci_upper_v4'] != null ? row['mis_oe_ci_upper_v4'].toFixed(2) : ''

        box2 += `<tr><td class="locus-info-label">pLI (v2):</td><td>${pliV2}</td></tr>`
        box2 += `<tr><td class="locus-info-label">pLI (v4):</td><td>${pliV4}</td></tr>`
        box2 += `<tr><td class="locus-info-label">LOEUF (v4):</td><td>${loeuf}</td></tr>`
        box2 += `<tr><td class="locus-info-label">Missense O/E (v4):</td><td>${moeuf}</td></tr>`

        // ClinGen curation summary
        box2 += `<tr><td class="locus-info-label">ClinGen Curation:</td><td>${getTruncatedText(row['clingen_curation'], 60)}</td></tr>`
        box2 += '</table>'
        $('#locus-page-row1-box2').html(box2)

        // --- AI Phenotype Summary ---
        if (row['LLM_phenotype_summary']) {
            $('#phenotype-summary-section').html(`
                <div class="source-section">
                    <h4>AI Phenotype Summary</h4>
                    <div class="phenotype-summary-card">${row['LLM_phenotype_summary']}</div>
                </div>
            `)
        }

        // --- Source: OMIM ---
        if (hasAnyValue(row['OMIM_mim_number'], row['OMIM_phenotype_mim_number'], row['OMIM_inheritance'], row['OMIM_phenotype_description'])) {
            let html = '<div class="source-section"><h4>OMIM</h4><table class="locus-info-table">'
            const mimLinks = (row['OMIM_mim_number'] || '').split(';').map(m => m.trim()).filter(m => m).map(m =>
                `<a href="https://omim.org/entry/${m}" target="_blank" class="action-link">${m}</a>`
            ).join('; ')
            html += `<tr><td class="locus-info-label">MIM #:</td><td>${mimLinks}</td></tr>`
            html += `<tr><td class="locus-info-label">Phenotype MIM #:</td><td>${row['OMIM_phenotype_mim_number'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${row['OMIM_inheritance'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Phenotype:</td><td style="white-space: normal;">${row['OMIM_phenotype_description'] || ''}</td></tr>`
            html += '</table></div>'
            $('#source-omim').html(html)
        }

        // --- Source: ClinGen ---
        if (hasAnyValue(row['CLINGEN_disease_label'], row['CLINGEN_disease_mondo_id'], row['CLINGEN_inheritance'], row['CLINGEN_classification'], row['CLINGEN_haploinsufficient'])) {
            let html = '<div class="source-section"><h4>ClinGen</h4><table class="locus-info-table">'
            html += `<tr><td class="locus-info-label">Disease:</td><td style="white-space: normal;">${row['CLINGEN_disease_label'] || ''}</td></tr>`
            const mondoId = row['CLINGEN_disease_mondo_id'] || ''
            const mondoLink = mondoId ? `<a href="https://monarchinitiative.org/${mondoId}" target="_blank" class="action-link">${mondoId}</a>` : ''
            html += `<tr><td class="locus-info-label">MONDO ID:</td><td>${mondoLink}</td></tr>`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${row['CLINGEN_inheritance'] || ''}</td></tr>`
            // Classification badge
            const classVal = row['CLINGEN_classification'] || ''
            if (classVal) {
                const classColors = { 'Definitive': '#28a745', 'Strong': '#218838', 'Moderate': '#ffc107', 'Limited': '#fd7e14' }
                const color = classColors[classVal] || '#6c757d'
                html += `<tr><td class="locus-info-label">Classification:</td><td><span class="ui mini label" style="background-color: ${color}; color: white;">${classVal}</span></td></tr>`
            }
            html += `<tr><td class="locus-info-label">Haploinsufficiency:</td><td>${row['CLINGEN_haploinsufficient'] || ''}</td></tr>`
            html += '</table></div>'
            $('#source-clingen').html(html)
        }

        // --- Source: GenCC ---
        if (hasAnyValue(row['GENCC_disease_name'], row['GENCC_classification'], row['GENCC_inheritance'])) {
            let html = '<div class="source-section"><h4>GenCC</h4><table class="locus-info-table">'
            html += `<tr><td class="locus-info-label">Disease:</td><td style="white-space: normal;">${row['GENCC_disease_name'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Classification:</td><td>${row['GENCC_classification'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${row['GENCC_inheritance'] || ''}</td></tr>`
            html += '</table></div>'
            $('#source-gencc').html(html)
        }

        // --- Source: PanelApp UK ---
        if (hasAnyValue(row['PANEL_APP_UK_confidence'], row['PANEL_APP_UK_penetrance'], row['PANEL_APP_UK_mode_of_pathogenicity'], row['PANEL_APP_UK_inheritance'], row['PANEL_APP_UK_evidence'], row['PANEL_APP_UK_phenotypes'], row['PANEL_APP_UK_panel_name'])) {
            let html = '<div class="source-section"><h4>PanelApp UK</h4><table class="locus-info-table">'
            html += `<tr><td class="locus-info-label">Confidence:</td><td>${row['PANEL_APP_UK_confidence'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Penetrance:</td><td>${row['PANEL_APP_UK_penetrance'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Pathogenicity:</td><td>${row['PANEL_APP_UK_mode_of_pathogenicity'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${row['PANEL_APP_UK_inheritance'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Evidence:</td><td style="white-space: normal;">${row['PANEL_APP_UK_evidence'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Phenotypes:</td><td style="white-space: normal;">${row['PANEL_APP_UK_phenotypes'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Panel:</td><td style="white-space: normal;">${row['PANEL_APP_UK_panel_name'] || ''}</td></tr>`
            html += '</table></div>'
            $('#source-panelapp-uk').html(html)
        }

        // --- Source: PanelApp AU ---
        if (hasAnyValue(row['PANEL_APP_AU_confidence'], row['PANEL_APP_AU_penetrance'], row['PANEL_APP_AU_mode_of_pathogenicity'], row['PANEL_APP_AU_inheritance'], row['PANEL_APP_AU_evidence'], row['PANEL_APP_AU_phenotypes'], row['PANEL_APP_AU_panel_name'])) {
            let html = '<div class="source-section"><h4>PanelApp AU</h4><table class="locus-info-table">'
            html += `<tr><td class="locus-info-label">Confidence:</td><td>${row['PANEL_APP_AU_confidence'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Penetrance:</td><td>${row['PANEL_APP_AU_penetrance'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Pathogenicity:</td><td>${row['PANEL_APP_AU_mode_of_pathogenicity'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${row['PANEL_APP_AU_inheritance'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Evidence:</td><td style="white-space: normal;">${row['PANEL_APP_AU_evidence'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Phenotypes:</td><td style="white-space: normal;">${row['PANEL_APP_AU_phenotypes'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Panel:</td><td style="white-space: normal;">${row['PANEL_APP_AU_panel_name'] || ''}</td></tr>`
            html += '</table></div>'
            $('#source-panelapp-au').html(html)
        }

        // --- Source: Decipher ---
        if (hasAnyValue(row['DECIPHER_inheritance'], row['DECIPHER_disease_names'])) {
            let html = '<div class="source-section"><h4>Decipher</h4><table class="locus-info-table">'
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${row['DECIPHER_inheritance'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Disease Names:</td><td style="white-space: normal;">${row['DECIPHER_disease_names'] || ''}</td></tr>`
            html += '</table></div>'
            $('#source-decipher').html(html)
        }

        // --- Source: ClinVar ---
        if (hasAnyValue(row['CLINVAR_phenotypes'], row['CLINVAR_clinical_significance'], row['CLINVAR_stars'], row['CLINVAR_variant_consequences'])) {
            let html = '<div class="source-section"><h4>ClinVar</h4><table class="locus-info-table">'
            html += `<tr><td class="locus-info-label">Phenotypes:</td><td style="white-space: normal;">${row['CLINVAR_phenotypes'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Clinical Significance:</td><td>${row['CLINVAR_clinical_significance'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Stars:</td><td>${row['CLINVAR_stars'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Variant Consequences:</td><td>${row['CLINVAR_variant_consequences'] || ''}</td></tr>`
            html += '</table></div>'
            $('#source-clinvar').html(html)
        }

        // --- Source: Fridman ---
        if (hasAnyValue(row['FRIDMAN_omim_phenotype_id'], row['FRIDMAN_phenotype_category'], row['FRIDMAN_inheritance'])) {
            let html = '<div class="source-section"><h4>Fridman</h4><table class="locus-info-table">'
            html += `<tr><td class="locus-info-label">OMIM Phenotype ID:</td><td>${row['FRIDMAN_omim_phenotype_id'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Phenotype Category:</td><td>${row['FRIDMAN_phenotype_category'] || ''}</td></tr>`
            html += `<tr><td class="locus-info-label">Inheritance:</td><td>${row['FRIDMAN_inheritance'] || ''}</td></tr>`
            html += '</table></div>'
            $('#source-fridman').html(html)
        }

        $('.question').popup({ on: 'click' })
        $('.show-popup').popup({ on: 'click', hoverable: true })
    }

    const performSearch = async () => {
        $('#error-message').hide()

        try {
            $('body').css('cursor', 'wait')

            const hgncGeneId = GLOBAL_PAGE_STATE['hgnc_gene_id']
            const ensgGeneId = GLOBAL_PAGE_STATE['gene_id']
            if (!hgncGeneId && !ensgGeneId) {
                displayError('Missing gene identifier in URL (eg. #hgnc_gene_id=HGNC:1100 or #gene_id=ENSG00000139618)')
                return
            }

            // Set page title immediately with whatever identifier we have
            const lookupId = hgncGeneId || ensgGeneId
            document.title = `Gene Lookup: ${lookupId}`
            $('#locus-page-title').text(`Gene Page: ${lookupId}`)

            let query
            if (hgncGeneId) {
                query = `SELECT * FROM ${COMPLETE_TABLE_ID} WHERE hgnc_gene_id = '${hgncGeneId}'`
            } else {
                query = `SELECT * FROM ${COMPLETE_TABLE_ID} WHERE gene_id = '${ensgGeneId}'`
            }

            window.searchResults = await queryBigQuery(query, 0, 1, null)

            console.log("Search results:", window.searchResults)

            if (!window.searchResults.rows || window.searchResults.rows.length === 0) {
                console.error("ERROR: gene not found", lookupId)
                displayError(`Gene not found: ${lookupId}`)
                return
            }

            displaySearchResults()

            // Initialize IGV with gene coordinates if not already set by URL
            const row = window.searchResults.rows[0]
            if (row['chrom'] && row['start'] != null && row['end'] != null) {
                const igvStart = Math.max(0, row['start'] - IGV_LOCUS_PADDING)
                const igvEnd = row['end'] + IGV_LOCUS_PADDING
                if (GLOBAL_PAGE_STATE['igvLoc'] === DEFAULT_GLOBAL_PAGE_STATE['igvLoc']) {
                    GLOBAL_PAGE_STATE['igvLoc'] = `${row['chrom']}:${igvStart}-${igvEnd}`
                }
            }

        } catch (error) {
            console.error('Error performing search:', error)
            displayError('Error performing search: ' + error.message)
        } finally {
            $('body').css('cursor', 'default')
        }
    }

    // Initialize modals
    ['about', 'faq', 'downloads'].forEach(prefix => {
        $(`#${prefix}-link`).click((e) => {
            e.preventDefault()
            $(`#${prefix}-modal`).modal('show')
        })
    })

    // Handle browser forward & back buttons
    window.addEventListener('popstate', readAndApplyPersistentPageStateFromUrl)

    // Init UI elements
    $('.ui.button').popup()
    $(".ui.checkbox").checkbox()

    $(document).ready(async () => {
        await readAndApplyPersistentPageStateFromUrl()
        console.log("Done initializing page. GLOBAL_PAGE_STATE:", GLOBAL_PAGE_STATE)
        $('body').css('cursor', 'default')
    })

</script>

</body>
</html>
