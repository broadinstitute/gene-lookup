        <a href="index.html">Gene Lookup for Rare Disease Analysis</a>
    </div>
    <div class="seven wide column" id="header-nav" style="min-width: 700px">
        {% if data_last_updated_date %}<span style="color: rgba(255, 255, 255, 0.6); font-size: calc(1em - 2px); white-space: nowrap">Updated: {{ data_last_updated_date }}</span>{% endif %}
        <a href="#" id="about-link" style="padding-left: 40px">About</a>

        <a href="#" id="downloads-link">Downloads</a>

                <i class="chevron left icon"></i> Prev
            </button>
            <span id="igv-nav-index">1 of 1</span>
            <button id="igv-nav-next" class="ui basic button" disabled>
                Next <i class="chevron right icon"></i>
