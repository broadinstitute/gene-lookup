    const writePersistentPageStateToUrl = () => {
        // Create object with only non-default values
        const nonDefaultParams = {}
        for (const [key, value] of Object.entries(GLOBAL_PAGE_STATE)) {
            if (value !== DEFAULT_GLOBAL_PAGE_STATE[key]) {
                // Use abbreviated URL param name if available
                const urlKey = URL_PARAM_ALIASES[key] || key
                nonDefaultParams[urlKey] = value
            }
        }

        // Convert to URL hash using jQuery's param method
        const hash = '#' + $.param(nonDefaultParams)

        // Get current hash to check if state has changed
        const currentHash = window.location.hash
        if (currentHash !== hash) {
            // Update URL and add to browser history
            window.history.pushState(null, '', hash)
        }

    const queryBigQuery = async (query, startIndex=null, pageSize=null, exportToFileFormat=null) => {
        try {
            const url = `https://us-central1-cmg-analysis.cloudfunctions.net/query_gene_lookup_db`
            console.log("Page state:", GLOBAL_PAGE_STATE)
            console.log(exportToFileFormat ? `Exporting to ${exportToFileFormat}:`: `Sending query:`, query.replace(/[\n\r\s]+/g, ' '))
            const requestBody = {
                sql: query,
                export_to_file_format: exportToFileFormat,
                start_index: startIndex,
                page_size: pageSize,
            }

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody),
            })

            if (!response.ok) {
                throw new Error(`BigQuery API error: ${response.status} ${response.statusText}`)
            }

            return await response.json()
        } catch (error) {
            console.error('Error querying BigQuery:', error)
            throw new Error(`BigQuery query error: ${error.message || 'Unknown error'}`)
        }
    }

    const getSourcesBadges = (sourcesStr) => {
        if (!sourcesStr) return ''
        // Format is like "3: OMIM, ClinGen, GenCC"
        const match = sourcesStr.match(/^(\d+):\s*(.*)$/)
        if (!match) return sourcesStr

        const sourcesList = match[2].split(',').map(s => s.trim())

        const pastelColors = ['#e8d5d5', '#d5dfe8', '#d5e8db', '#e8e2d5', '#ddd5e8', '#d5e8e6', '#e8d5e0', '#e0e8d5']

        const makeBadge = (src, i) => `<span class="ui mini label" style="background-color: ${pastelColors[i % pastelColors.length]}; color: #333; margin: 1px;">${src}</span>`

        const inlineBadges = sourcesList.slice(0, 2).map(makeBadge).join(' ')
        if (sourcesList.length <= 2) return inlineBadges

        const allBadges = sourcesList.map(makeBadge).join(' ')
        return `${inlineBadges} <span class="show-popup action-link" data-html="${allBadges.replace(/"/g, '&quot;')}">(+${sourcesList.length - 2} more)</span>`
    }

    const getTruncatedText = (text, maxLen=80) => {
        if (!text) return ''

        const escapedFull = text.replace(/"/g, '&quot;').replace(/'/g, '&#39;')
        return `<span class="show-popup" data-html="<div style='max-width:400px'>${escapedFull}</div>">${text.substring(0, maxLen)}...</span>`

    /**
     * Build a WHERE clause for a search query.
     * Supports: gene name/alias, HGNC ID, Ensembl gene ID, genomic region, disease/phenotype text,
     * and comma-separated lists of the above.
     */
    const buildSearchWhereClause = (rawQuery) => {
        if (!rawQuery || !rawQuery.trim()) return ''

        // Check for comma-separated list of queries
        const queries = rawQuery.split(',').map(q => q.trim()).filter(q => q)
        if (queries.length > 1) {
            const clauses = queries.map(q => buildSingleSearchWhereClause(q)).filter(c => c)
            if (clauses.length === 0) return ''
            return `(${clauses.join(' OR ')})`
        }

        return buildSingleSearchWhereClause(rawQuery.trim())
    }

    const buildSingleSearchWhereClause = (q) => {
        if (!q) return ''

        // Genomic region: chr1:12345-67890
        const regionMatch = q.match(REFERENCE_REGION_REGEXP)
        if (regionMatch) {
            const chrom = regionMatch[1]
            const start = parseInt(regionMatch[2].replace(/,/g, ''))
            const end = parseInt(regionMatch[3].replace(/,/g, ''))
            return `(gene_chrom = '${chrom}' AND gene_start < ${end} AND gene_end > ${start})`
        }

        // HGNC gene ID: HGNC:1234
        const escapedQ = escapeSqlString(q)

        if (/^HGNC:\d+$/i.test(q)) {
            return `(UPPER(hgnc_gene_id) = UPPER('${escapedQ}'))`
        }

        // Ensembl gene ID: ENSG00000000001
        if (/^ENSG\d+/i.test(q)) {
            return `(UPPER(ensembl_gene_id) = UPPER('${escapedQ}'))`
        }

        // Always search both gene name/alias and disease/phenotype text
        const phenotypeColumns = [
            'LLM_phenotype_summary',
            'OMIM_phenotype_description',
            'CLINGEN_disease_label',
            'GENCC_disease_name',
            'PANEL_APP_UK_phenotypes',
            'PANEL_APP_AU_phenotypes',
            'DECIPHER_disease_names',
            'CLINVAR_phenotypes',
        ]
        const textClauses = phenotypeColumns.map(col => `UPPER(${col}) LIKE UPPER('%${escapedQ}%')`)
        const geneClause = `UPPER(gene_symbol) = UPPER('${escapedQ}') OR UPPER(gene_aliases) LIKE UPPER('%${escapedQ}%')`
        return `(${geneClause} OR ${textClauses.join(' OR ')})`
    }

    /**
     * Build a WHERE clause for custom filters.
     * Custom filters are stored in GLOBAL_PAGE_STATE.customFilters as "col|op|val;col|op|val"
     * where op is a SQL operator (=, !=, >, <, >=, <=, LIKE, IS NULL, IS NOT NULL).
     */
    const buildCustomFiltersWhereClause = () => {
        const filtersStr = GLOBAL_PAGE_STATE.customFilters
        if (!filtersStr || !filtersStr.trim()) return ''

        const allowedOps = new Set(['=', '!=', '>', '<', '>=', '<=', 'LIKE', 'IS NULL', 'IS NOT NULL'])
        const clauses = []
        for (const filterStr of filtersStr.split(';')) {
            const parts = filterStr.split('|')
            if (parts.length < 2) continue

            const col = parts[0]
            const op = parts[1]
            let val
            try {
                val = decodeURIComponent(parts.slice(2).join('|'))
            } catch (e) {
                val = parts.slice(2).join('|')
            }

            // Validate column name and operator
            if (!BIGQUERY_COLUMN_DESCRIPTIONS[col] && !TABLE_COLUMNS[col]) continue
            if (!allowedOps.has(op)) continue

            if (op === 'IS NULL' || op === 'IS NOT NULL') {
                clauses.push(`${col} ${op}`)
            } else if (op === 'LIKE') {
                const escapedValue = val.replace(/'/g, "''")
                clauses.push(`${col} LIKE '${escapedValue}'`)
            } else {
                const colInfo = BIGQUERY_COLUMN_DESCRIPTIONS[col]
                if (colInfo && (val.trim() !== '' && isFinite(Number(val)))) {
                    clauses.push(`${col} ${op} ${Number(val)}`)
                } else {
                    const escapedValue = val.replace(/'/g, "''")
                    clauses.push(`${col} ${op} '${escapedValue}'`)
                }
            }
        }

        return clauses.join(' AND ')
    }

    const DEFAULT_VISIBLE_COLUMNS = [
        'gene_symbol',
        'inheritance',
        'sources',
        'LLM_phenotype_summary',
        'pLI_v4',
        'lof_oe_ci_upper_v4',
        'CLINGEN_classification',
    ]


</script>
