<script>

    // BigQuery config
    const PROJECT_ID = 'cmg-analysis'
    const COMPLETE_TABLE_ID = `\`cmg-analysis.gene_lookup.combined_gene_disease_association_table\``

    const SHOW_COLUMNS_VALUE_DELIMITER = ','

    const IGV_LOCUS_PADDING = 5000

    const REFERENCE_REGION_REGEXP = /^[\s]*(?:chr)?([XYMTt0-9]+):([\d,]+)[\p{Dash_Punctuation}]([\d,]+)[\s]*$/iu

    // BigQuery column descriptions - generated from global_constants.py via Jinja2
    const BIGQUERY_COLUMN_DESCRIPTIONS = {{ column_descriptions | tojson }}
    const BIGQUERY_COLUMN_TYPES = {{ column_types | tojson }}

    const BIGQUERY_COLUMN_GROUPS = {{ column_groups | tojson }}

    // Help texts for UI columns - starts with BigQuery descriptions, then adds/overrides
    const RESULTS_TABLE_COLUMN_HELP_TEXTS = {
        ...BIGQUERY_COLUMN_DESCRIPTIONS,
    }

    // Enrich plain-text column descriptions with HTML links to cited preprints. Output is intended
    // for use inside a popup's data-html attribute (HTML-rendered), so the embedded <a> uses single
    // quotes to avoid breaking the surrounding double-quoted attribute.
    const enrichHelpText = (text) => {
        if (!text) return ''
        return String(text).replace(
            /Guez, Goodrich et al\. 2026/g,
            "<a href='https://doi.org/10.64898/2026.03.23.26349081' target='_blank'>Guez, Goodrich et al. 2026</a>"
        )
    }

    const DEFAULT_SORT_COLUMN = 'gene_symbol'
    const DEFAULT_SORT_DIRECTION = 'ASC'

    const REFERENCE_BASE_URL = "https://storage.googleapis.com/tgg-viewer/ref/GRCh38"

    const REFERENCE_TRACKS = [
        ["igv_gencode", "Gencode v49", `${REFERENCE_BASE_URL}/gencode_v49/gencode.v49.GRCh38.sorted.txt.gz`],
        ["igv_haploinsuf", "ClinGen haploinsufficiency track", `${REFERENCE_BASE_URL}/clingen/ClinGen_haploinsufficiency_gene_GRCh38.sorted.bed.gz`],
        ["igv_triplosens", "ClinGen triplosensitivity track", `${REFERENCE_BASE_URL}/clingen/ClinGen_triplosensitivity_gene_GRCh38.sorted.bed.gz`],
        ["igv_segdups", "SegDups > 1000bp", `${REFERENCE_BASE_URL}/segdups/segdups.gtf.gz`],
        ["igv_36k_map", "36-mer mappability", `${REFERENCE_BASE_URL}/mappability/GRCh38_no_alt_analysis_set_GCA_000001405.15-k36_m2.bw`],
        ["igv_100k_map", "100-mer mappability", `${REFERENCE_BASE_URL}/mappability/GRCh38_no_alt_analysis_set_GCA_000001405.15-k100_m2.bw`],
        ["igv_repeatmask", "UCSC RepeatMasker", `${REFERENCE_BASE_URL}/hg38.RepeatMasker.bed.gz`],
    ]

    const ALL_AVAILABLE_TRACKS = REFERENCE_TRACKS

    // persistent page state (added to the URL)
    let DEFAULT_GLOBAL_PAGE_STATE = {
        currentPage: 1,
        pageSize: 100,

        sc: DEFAULT_SORT_COLUMN,
        sd: DEFAULT_SORT_DIRECTION,

        showIGV: 0,
        igvLoc: 'chr7:117465784-117715971',

        showRs: 0,  //show results table
        searchQuery: '',
        showAdvFilters: 0,

        // Custom filters: compact format "col|op|val,col|op|val"
        customFilters: '',

        // Custom track URLs
        igv_custom_track_url_1: '',
        igv_custom_track_url_2: '',
        igv_custom_track_url_3: '',
    }

    // set default IGV.js tracks
    ALL_AVAILABLE_TRACKS.forEach((rt) => {
        DEFAULT_GLOBAL_PAGE_STATE[rt[0]] = 0
    })
    DEFAULT_GLOBAL_PAGE_STATE['igv_gencode'] = 1

    // Mapping from internal state names to abbreviated URL param names
    const URL_PARAM_ALIASES = {
        'searchQuery': 'q',
        'customFilters': 'cf',
        'igv_custom_track_url_1': 'igv_ct_url1',
        'igv_custom_track_url_2': 'igv_ct_url2',
        'igv_custom_track_url_3': 'igv_ct_url3',
    }

    // Reverse mapping from URL param names to internal state names
    const URL_PARAM_REVERSE_ALIASES = Object.fromEntries(
        Object.entries(URL_PARAM_ALIASES).map(([k, v]) => [v, k])
    )
    // Support common query-string variant used by external links
    URL_PARAM_REVERSE_ALIASES['search-query'] = 'searchQuery'

    const writePersistentPageStateToUrl = () => {
        // Create object with only non-default values
        const nonDefaultParams = {}
        for (const [key, value] of Object.entries(GLOBAL_PAGE_STATE)) {
            if (value !== DEFAULT_GLOBAL_PAGE_STATE[key]) {
                // Use abbreviated URL param name if available
                const urlKey = URL_PARAM_ALIASES[key] || key
                nonDefaultParams[urlKey] = value
            }
        }

        // Convert to URL hash using jQuery's param method
        const hash = '#' + $.param(nonDefaultParams)

        // Get current hash to check if state has changed
        const currentHash = window.location.hash
        if (currentHash !== hash) {
            // Update URL and add to browser history
            window.history.pushState(null, '', hash)
        }
    }


    const queryBigQuery = async (query, startIndex=null, pageSize=null, exportToFileFormat=null) => {
        try {
            const url = `https://us-central1-cmg-analysis.cloudfunctions.net/query_gene_lookup_db`
            console.log("Page state:", GLOBAL_PAGE_STATE)
            console.log(exportToFileFormat ? `Exporting to ${exportToFileFormat}:`: `Sending query:`, query.replace(/[\n\r\s]+/g, ' '))
            const requestBody = {
                sql: query,
                export_to_file_format: exportToFileFormat,
                start_index: startIndex,
                page_size: pageSize,
            }

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody),
            })

            if (!response.ok) {
                throw new Error(`BigQuery API error: ${response.status} ${response.statusText}`)
            }

            return await response.json()
        } catch (error) {
            console.error('Error querying BigQuery:', error)
            throw new Error(`BigQuery query error: ${error.message || 'Unknown error'}`)
        }
    }

    // Escape backslashes first (otherwise a user-supplied \' would survive as an escaped quote in
    // BigQuery standard SQL and break out of the surrounding string literal), then double quotes.
    const escapeSqlString = (s) => String(s).replace(/\\/g, '\\\\').replace(/'/g, "''")

    const dedupSemicolonArray = (s) => {
        const out = []
        const seen = new Set()
        for (const v of String(s || '').split(';').map(x => x.trim())) {
            if (!v || seen.has(v)) continue
            seen.add(v)
            out.push(v)
        }
        return out
    }
    const dedupSemicolon = (s) => dedupSemicolonArray(s).join('; ')

    // Inheritance types — colors and aliases (short codes + verbose long-form strings). Used to
    // colorize occurrences in inheritance cells and build the on-click explanation popup. The
    // aliases mirror the normalized values emitted by the pipeline (see get_panel_app_table.py,
    // get_gencc_table.py, get_decipher_genes.py for upstream short-code maps).
    const INHERITANCE_TYPES = [
        { name: 'Autosomal dominant',         color: '#e67e22', code: 'AD',   aliases: ['AD', 'Autosomal dominant'] },
        { name: 'Autosomal recessive',        color: '#2980b9', code: 'AR',   aliases: ['AR', 'Autosomal recessive'] },
        { name: 'X-linked',                   color: '#b8860b', code: 'XL',   aliases: ['XL', 'X-linked'] },
        { name: 'X-linked dominant',          color: '#daa520', code: 'XD',   aliases: ['XD', 'X-linked dominant'] },
        { name: 'X-linked recessive',         color: '#996515', code: 'XR',   aliases: ['XR', 'X-linked recessive'] },
        { name: 'Y-linked',                   color: '#1e8449', code: 'YL',   aliases: ['YL', 'Y-linked'] },
        { name: 'Mitochondrial',              color: '#c0392b', code: 'MITO', aliases: ['MITO', 'MITOCHONDRIAL', 'Mitochondrial'] },
        { name: 'Semidominant',               color: '#8e44ad', code: 'SD',   aliases: ['SD', 'Semidominant'] },
        { name: 'Multifactorial',             color: '#16a085', code: '',     aliases: ['Multifactorial'] },
        { name: 'Digenic dominant',           color: '#a04000', code: '',     aliases: ['Digenic dominant'] },
        { name: 'Digenic recessive',          color: '#6e2c00', code: '',     aliases: ['Digenic recessive'] },
        { name: 'Pseudoautosomal dominant',   color: '#cd6155', code: '',     aliases: ['Pseudoautosomal dominant'] },
        { name: 'Pseudoautosomal recessive',  color: '#a93226', code: '',     aliases: ['Pseudoautosomal recessive'] },
        { name: 'Somatic mutation',           color: '#5d6d7e', code: '',     aliases: ['Somatic mutation', 'Somatic'] },
        { name: 'Somatic mosaicism',          color: '#34495e', code: '',     aliases: ['Somatic mosaicism'] },
        { name: 'Isolated cases',             color: '#7f8c8d', code: '',     aliases: ['Isolated cases'] },
        { name: 'Unknown dominant',           color: '#95a5a6', code: 'UD',   aliases: ['UD'] },
        { name: 'Other',                      color: '#4a5568', code: '',     aliases: ['Other'] },
    ]

    // Lookup: lowercased alias string -> { name, color, code }. Lookups are case-insensitive so
    // upstream variants like "mitochondrial" / "MITOCHONDRIAL" / "Mitochondrial" all match.
    const INHERITANCE_ALIAS_LOOKUP = (() => {
        const lookup = {}
        for (const t of INHERITANCE_TYPES) for (const a of t.aliases) lookup[a.toLowerCase()] = t
        return lookup
    })()

    // Regex matching any inheritance-type alias at a non-alphanumeric boundary, case-insensitive.
    // Longest aliases first so "Autosomal dominant" matches before "AD" would partial-match.
    const INHERITANCE_ALIAS_REGEX = (() => {
        const aliases = []
        for (const t of INHERITANCE_TYPES) for (const a of t.aliases) aliases.push(a)
        aliases.sort((a, b) => b.length - a.length)
        const escaped = aliases.map(a => a.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))
        return new RegExp(`(?<![A-Za-z0-9])(${escaped.join('|')})(?![A-Za-z0-9])`, 'gi')
    })()

    // Wrap every alias occurrence in a colored <span>. Other text passes through unchanged.
    const colorizeInheritanceText = (text) => text.replace(INHERITANCE_ALIAS_REGEX, (m, alias) => {
        const t = INHERITANCE_ALIAS_LOOKUP[alias.toLowerCase()]
        return `<span style="color: ${t.color}; font-weight: 600;">${alias}</span>`
    })

    // Truncate the plain text at maxLen plain chars by walking semicolon-separated parts, then
    // colorize each kept part. Returns { display, truncated } where display is the (possibly
    // truncated) colorized HTML and truncated is whether truncation happened.
    const truncateInheritanceForCell = (text, maxLen) => {
        if (text.length <= maxLen) return { display: colorizeInheritanceText(text), truncated: false }
        const parts = text.split(';').map(p => p.trim()).filter(Boolean)
        const kept = []
        let lenSoFar = 0
        for (const p of parts) {
            const partLen = p.length + (kept.length > 0 ? 2 : 0)  // "; " separator
            if (lenSoFar + partLen > maxLen - 3) break             // leave room for "..."
            kept.push(p)
            lenSoFar += partLen
        }
        if (kept.length === 0) return { display: colorizeInheritanceText(parts[0].slice(0, maxLen - 3)) + '…', truncated: true }
        return { display: colorizeInheritanceText(kept.join('; ')) + '…', truncated: true }
    }

    // Collect the inheritance types referenced in `text`, in INHERITANCE_TYPES (declared) order.
    const findInheritanceTypesInText = (text) => {
        const present = new Set()
        for (const m of text.matchAll(INHERITANCE_ALIAS_REGEX)) present.add(INHERITANCE_ALIAS_LOOKUP[m[1].toLowerCase()])
        return INHERITANCE_TYPES.filter(t => present.has(t))
    }

    // Render an Inheritance cell value: colorize known types, truncate at maxLen chars, and (when
    // any types are recognized or the text is truncated) wrap in a .show-popup click-popup whose
    // body shows the full colorized text plus a legend mapping each code to its full name.
    const renderInheritanceCell = (rawText, maxLen=20) => {
        const text = dedupInheritance(rawText)
        if (!text) return ''
        const fullColored = colorizeInheritanceText(text)
        const { display, truncated } = truncateInheritanceForCell(text, maxLen)
        const types = findInheritanceTypesInText(text)
        if (!truncated && types.length === 0) return fullColored

        // Only show legend entries for types that have a short code (eg. AD = autosomal dominant);
        // types like "Somatic mutation" / "Other" add no extra info beyond what's in the cell.
        const typesWithCode = types.filter(t => t.code)
        if (!truncated && typesWithCode.length === 0) return fullColored

        let popupContent = ''
        if (truncated) popupContent += `<div>${fullColored}</div>`
        if (truncated && typesWithCode.length > 0) {
            popupContent += `<hr style="border: none; border-top: 1px solid #e0e0e0; margin: 8px 0;">`
        }
        if (typesWithCode.length > 0) {
            popupContent += typesWithCode.map(t =>
                `<b style="color: ${t.color};">${t.code}</b> = ${t.name}`
            ).join('<br />')
        }
        const escaped = popupContent.replace(/"/g, '&quot;')
        return `<span class="show-popup" data-html="${escaped}" style="cursor: pointer;">${display}</span>`
    }

    // Collapse the various combined inheritance notations the upstream sources emit (e.g. AD/AR,
    // AR/AD, AD-AR, AR-AD, XD/XR, optionally with a parenthetical like "(AR is more severe)") so
    // that any combined form expands into its constituent two-letter codes, and the deduped 2-letter
    // codes are listed in alphabetical order. Non-two-letter modes (MITO, SD, verbose strings like
    // "Autosomal dominant, Somatic mutation", parenthetical-only entries, etc.) are preserved in
    // their original order after the alphabetized 2-letter codes. See generate_combined_gene_table.py
    // for the raw upstream values; the BigQuery table currently contains ~180 unique inheritance
    // strings, many of which restate the same modes in multiple notations.
    const dedupInheritance = (s) => {
        if (!s) return ''
        const parts = dedupSemicolonArray(s)
        // Case-insensitive: upstream sources may emit lowercase variants like "ad/ar" or "Ad-Ar".
        // Codes are normalized to uppercase before going into the detected set.
        const combinedRegex = /^([A-Z]{2})[\/\-]([A-Z]{2})(\s*\(.*\))?$/i
        const twoLetterRegex = /^[A-Z]{2}$/i
        const detectedCodes = new Set()
        const others = []
        for (const p of parts) {
            const m = combinedRegex.exec(p)
            if (m) {
                detectedCodes.add(m[1].toUpperCase())
                detectedCodes.add(m[2].toUpperCase())
            } else if (twoLetterRegex.test(p)) {
                detectedCodes.add(p.toUpperCase())
            } else {
                others.push(p)
            }
        }
        // XL is the general X-linked category; drop it when a subtype (XD or XR) is present, since
        // the subtype already implies X-linked inheritance.
        if (detectedCodes.has('XL') && (detectedCodes.has('XD') || detectedCodes.has('XR'))) {
            detectedCodes.delete('XL')
        }
        const codes = Array.from(detectedCodes).sort()
        return [...codes, ...others].join(', ')
    }

    // Initialize Semantic UI hover popups for elements tagged with .source-hover-popup (used by
    // source badges) and .constraint-hover-popup (used by red-highlighted constraint-score cells).
    // Called once per table render, and again from the outer "(+N more)" popup's onVisible callback
    // so that nested elements (which only enter the DOM when the outer popup is shown) also get
    // their hover popups.
    const initSourceBadgePopups = (rootEl) => {
        const $scope = rootEl ? $(rootEl) : $(document)
        $scope.find('.source-hover-popup, .constraint-hover-popup').popup({
            on: 'hover',
            delay: { show: 80, hide: 50 },
            position: 'top center',
        })
    }

    // Format a constraint-score value for display in the results table. When the value crosses
    // its CONSTRAINT_THRESHOLDS threshold (same threshold the pipeline uses to add the source-badge),
    // the value is rendered in red with a hover popup explaining the threshold. Otherwise the
    // value is rendered as plain text.
    const renderConstraintValue = (val, thresholdKey, labelForPopup) => {
        if (val == null) return ''
        const formatted = val.toFixed(2)
        const t = CONSTRAINT_THRESHOLDS[thresholdKey]
        if (!t) return formatted
        const op = t.operator === '>=' ? '≥' : '≤'
        const crosses = (cutoff) => t.operator === '>=' ? val >= cutoff : val <= cutoff
        if (crosses(t.value)) {
            const popup = `<div style='white-space: nowrap;'><b>${labelForPopup}</b>: highlighted when ${op} ${t.value}.</div>`.replace(/"/g, '&quot;')
            return `<span class="constraint-hover-popup" data-html="${popup}" style="color: #c0392b; font-weight: bold;">${formatted}</span>`
        }
        if (t.warn_value != null && crosses(t.warn_value)) {
            const popup = `<div style='white-space: nowrap;'><b>${labelForPopup}</b>: highlighted when ${op} ${t.warn_value} (constrained); ${op} ${t.value} bold red (highly constrained).</div>`.replace(/"/g, '&quot;')
            return `<span class="constraint-hover-popup" data-html="${popup}" style="color: #b7791f; font-weight: 600;">${formatted}</span>`
        }
        return formatted
    }

    // Renders a single value as "X.XX" wrapped in a colored background box (gnomAD-browser style)
    // when it crosses the configured threshold(s). Used for metrics where the value itself is the
    // primary signal (eg. Missense Z). For two-tier thresholds (value + warn_value): darker box at
    // value, lighter at warn_value. For single-tier (value only): lighter box at value.
    const renderConstraintBadge = (val, thresholdKey, labelForPopup) => {
        if (val == null) return ''
        const formatted = val.toFixed(2)
        const t = CONSTRAINT_THRESHOLDS[thresholdKey]
        if (!t) return formatted
        const op = t.operator === '>=' ? '≥' : '≤'
        const crosses = (cutoff) => t.operator === '>=' ? val >= cutoff : val <= cutoff
        const boxStyle = "padding: 1px 6px; border-radius: 3px; font-weight: 600;"
        if (t.warn_value != null) {
            if (crosses(t.value)) {
                const popup = `<div style='white-space: nowrap;'><b>${labelForPopup}</b>: highlighted when ${op} ${t.warn_value} (constrained); darker highlight when ${op} ${t.value} (highly constrained).</div>`.replace(/"/g, '&quot;')
                return `<span class="constraint-hover-popup" data-html="${popup}" style="background-color: #dd6b20; color: #fff; ${boxStyle}">${formatted}</span>`
            }
            if (crosses(t.warn_value)) {
                const popup = `<div style='white-space: nowrap;'><b>${labelForPopup}</b>: highlighted when ${op} ${t.warn_value} (constrained); darker highlight when ${op} ${t.value} (highly constrained).</div>`.replace(/"/g, '&quot;')
                return `<span class="constraint-hover-popup" data-html="${popup}" style="background-color: #f6ad55; color: #1a202c; ${boxStyle}">${formatted}</span>`
            }
            return formatted
        }
        if (crosses(t.value)) {
            const popup = `<div style='white-space: nowrap;'><b>${labelForPopup}</b>: highlighted when ${op} ${t.value} (constrained).</div>`.replace(/"/g, '&quot;')
            return `<span class="constraint-hover-popup" data-html="${popup}" style="background-color: #f6ad55; color: #1a202c; ${boxStyle}">${formatted}</span>`
        }
        return formatted
    }

    // Renders an observed/expected interval as "o/e = 0.30 (0.25 - 0.35)". The upper-CI bound is
    // wrapped in a colored background box (gnomAD-browser style) when it crosses the warn_value or
    // value threshold — orange for "constrained", darker orange for "highly constrained". Pass a
    // null thresholdKey to render the interval without highlighting (eg. when another metric like
    // Missense Z is the primary signal). If oe or upper is missing, returns whatever pieces are
    // available with no highlight.
    const renderConstraintInterval = (oe, ciLower, ciUpper, thresholdKey, labelForPopup) => {
        if (oe == null && ciUpper == null) return ''
        const fmt = (v) => v == null ? '?' : v.toFixed(2)
        const prefix = `o/e = ${fmt(oe)} (${fmt(ciLower)} - `
        const upperStr = fmt(ciUpper)
        const suffix = ')'
        const t = CONSTRAINT_THRESHOLDS[thresholdKey]
        if (!t || ciUpper == null) return `${prefix}${upperStr}${suffix}`
        const op = t.operator === '>=' ? '≥' : '≤'
        const crosses = (cutoff) => t.operator === '>=' ? ciUpper >= cutoff : ciUpper <= cutoff
        const boxStyle = "padding: 1px 6px; border-radius: 3px; font-weight: 600;"
        let upperHTML = upperStr
        if (crosses(t.value)) {
            const popup = `<div style='white-space: nowrap;'><b>${labelForPopup}</b>: upper bound highlighted when ${op} ${t.value} (highly constrained).</div>`.replace(/"/g, '&quot;')
            upperHTML = `<span class="constraint-hover-popup" data-html="${popup}" style="background-color: #dd6b20; color: #fff; ${boxStyle}">${upperStr}</span>`
        } else if (t.warn_value != null && crosses(t.warn_value)) {
            const popup = `<div style='white-space: nowrap;'><b>${labelForPopup}</b>: upper bound highlighted when ${op} ${t.warn_value} (constrained); darker highlight when ${op} ${t.value} (highly constrained).</div>`.replace(/"/g, '&quot;')
            upperHTML = `<span class="constraint-hover-popup" data-html="${popup}" style="background-color: #f6ad55; color: #1a202c; ${boxStyle}">${upperStr}</span>`
        }
        return `${prefix}${upperHTML}${suffix}`
    }

    // Constraint-score thresholds exported from website/global_constants.py — single source of truth.
    // Pipeline (annotation_utils/generate_combined_gene_table.py) reads the same dict.
    const CONSTRAINT_THRESHOLDS = {{ constraint_thresholds_json | safe }}

    const constraintHoverText = (label, key, extra) => {
        const t = CONSTRAINT_THRESHOLDS[key]
        if (!t) return `<b>${label}</b>: ${extra}`
        const op = t.operator === '>=' ? '≥' : (t.operator === '<=' ? '≤' : t.operator)
        return `<b>${label}</b>: ${extra} Badge shown when ${op} ${t.value}`
    }

    const gnomadGeneUrl = (ensemblId, dataset) => ensemblId
        ? `https://gnomad.broadinstitute.org/gene/${encodeURIComponent(ensemblId)}?dataset=${dataset}`
        : 'https://gnomad.broadinstitute.org/'

    // Per-source config: color, hover-tooltip description, and url (gene-specific link target).
    // Keys match the source labels emitted by compute_sources_string() in generate_combined_gene_table.py.
    // Descriptions are exposed via `class="source-hover-popup" data-html="..."` on each badge and
    // surfaced through Semantic UI hover popups initialized by initSourceBadgePopups(). Badges nested
    // inside the "(+N more)" click-popup are wired up by an onVisible hook on `.show-popup` that
    // re-runs initSourceBadgePopups inside the just-opened popup body (Semantic UI's popup plugin
    // doesn't initialize popups on descendants that enter the DOM after init).
    const SOURCES = {
        'OMIM': {

    const DEFAULT_SOURCE_COLOR = '#e0e0e0'
    const getSourceInfo = (src) => SOURCES[src.split(':')[0]] || {}

    const getSourcesBadges = (sourcesStr, ids = null) => {
        if (!sourcesStr) return ''
        // Format is like "3: OMIM, ClinGen, GenCC"
        const match = sourcesStr.match(/^(\d+):\s*(.*)$/)
        if (!match) return sourcesStr

        const sourcesList = match[2].split(',').map(s => s.trim())

        // Render a colored badge wrapped in a link to the source's gene-specific URL (when one exists).
        // Used both for the 1-2 inline badges and for the badges shown inside the "(+N more)" popup.
        // The `.source-hover-popup` class + `data-html` attribute drive a Semantic UI hover popup
        // (initialized via initSourceBadgePopups, including re-init on the "(+N more)" outer popup
        // so that nested badges that enter the DOM later also get their hover popups).
        const makeBadge = (src) => {
            const info = getSourceInfo(src)
            const color = info.color || DEFAULT_SOURCE_COLOR
            const badge = `<span class="ui mini label" style="background-color: ${color}; color: #333; margin: 1px;">${src}</span>`
            const url = info.url ? info.url(ids || {}) : null
            const popupAttr = info.description
                ? ` class="source-hover-popup" data-html="<div style='white-space: nowrap;'>${info.description.replace(/"/g, '&quot;')}</div>"`
                : ''
            if (url)              return `<a href="${url}" target="_blank" style="text-decoration: none;"${popupAttr}>${badge}</a>`
            if (info.description) return `<span${popupAttr}>${badge}</span>`
            return badge
        }

        const inlineBadges = sourcesList.slice(0, 2).map(makeBadge).join(' ')
        if (sourcesList.length <= 2) return inlineBadges

        const overflowBadges = sourcesList.slice(2).map(makeBadge).join(' ')
        return `${inlineBadges} <span class="show-popup action-link" data-html="${overflowBadges.replace(/"/g, '&quot;')}">(+${sourcesList.length - 2} more)</span>`
    }

    const escapeHtml = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')

    /**
     * Build a WHERE clause for a search query.
     * Supports: gene name/alias, HGNC ID, Ensembl gene ID, genomic region, disease/phenotype text,
     * and comma-separated lists of the above.
     */
    const buildSearchWhereClause = (rawQuery) => {
        if (!rawQuery || !rawQuery.trim()) return ''

        // Check for comma-separated list of queries. Split on any comma EXCEPT one sitting between
        // two digits, so thousands-separators in genomic coordinates (eg. chr17:43,044,295-43,125,483)
        // are preserved while gene lists still split correctly even when a symbol ends in a digit
        // (eg. "SMN1, CFTR" or "SMN1,CFTR" -> ["SMN1", "CFTR"]).
        const queries = rawQuery.split(/(?<!\d),|,(?!\d)/).map(q => q.trim()).filter(q => q)
        if (queries.length > 1) {
            const clauses = queries.map(q => buildSingleSearchWhereClause(q)).filter(c => c)
            if (clauses.length === 0) return ''
            return `(${clauses.join(' OR ')})`
        }

        return buildSingleSearchWhereClause(rawQuery.trim())
    }

    const buildSingleSearchWhereClause = (q) => {
        if (!q) return ''

        // Genomic region: chr1:12345-67890
        const regionMatch = q.match(REFERENCE_REGION_REGEXP)
        if (regionMatch) {
            // gene_chrom is sourced from Ensembl seq_region.name and stored uppercase, with
            // mitochondrial as 'MT' (not 'M'). Normalize the user-supplied chrom to match.
            let chrom = regionMatch[1].toUpperCase()
            if (chrom === 'M') chrom = 'MT'
            const start = parseInt(regionMatch[2].replace(/,/g, ''))
            const end = parseInt(regionMatch[3].replace(/,/g, ''))
            // gene_start / gene_end are 1-based inclusive (from Ensembl seq_region_start/end), so
            // use inclusive comparisons to include genes whose boundary equals a query endpoint.
            return `(gene_chrom = '${chrom}' AND gene_start <= ${end} AND gene_end >= ${start})`
        }

        // HGNC gene ID: HGNC:1234
        const escapedQ = escapeSqlString(q)

        if (/^HGNC:\d+$/i.test(q)) {
            return `(UPPER(hgnc_gene_id) = UPPER('${escapedQ}'))`
        }

        // Ensembl gene ID (optional version, matched version-insensitively): ENSG00000000001[.N]
        if (/^ENSG\d+(\.\d+)?$/i.test(q)) {
            return `(UPPER(ensembl_gene_id) = UPPER('${escapeSqlString(q.replace(/\.\d+$/, ''))}'))`
        }

        // NCBI Gene ID (Entrez): all digits.
        if (/^\d+$/.test(q)) {
            return `(ncbi_gene_id = ${Number(q)})`
        }

        // RefSeq accession (gene/transcript, optional version): NM_/NR_/NG_/NP_/XM_/XR_/XP_. Matched
        // version-insensitively against the HGNC gene-level RefSeq id and the MANE RefSeq accessions.
        if (/^[NX][MRGP]_\d+(\.\d+)?$/i.test(q)) {
            const rs = q.replace(/\.\d+$/, '').toUpperCase()
            const concat = `UPPER(CONCAT(${REFSEQ_MATCH_COLUMNS.map(c => `IFNULL(${c}, '')`).join(", ';', ")}))`
            return `(EXISTS(SELECT 1 FROM UNNEST(REGEXP_EXTRACT_ALL(${concat}, r'[A-Z]+_[0-9]+')) rs WHERE rs = '${escapeSqlString(rs)}'))`
        }

        // MANE Ensembl transcript ID (optional version), matched version-insensitively.
        if (/^ENST\d+(\.\d+)?$/i.test(q)) {
            const t = q.replace(/\.\d+$/, '').toUpperCase()
            const concat = `UPPER(CONCAT(IFNULL(MANE_canonical_transcript_ensembl_id, ''), ';', IFNULL(MANE_clinical_transcript_ensembl_id, '')))`
            return `(EXISTS(SELECT 1 FROM UNNEST(REGEXP_EXTRACT_ALL(${concat}, r'ENST[0-9]+')) t WHERE t = '${escapeSqlString(t)}'))`
        }

        // HPO term ID: HP:0001250. DBNSFP_hpo_id is semicolon-separated, so match as substring.
        if (/^HP:\d+$/i.test(q)) {
            return `(UPPER(DBNSFP_hpo_id) LIKE UPPER('%${escapedQ}%'))`
        }

        // Always search both gene name/alias and disease/phenotype text
        const phenotypeColumns = [
            'LLM_phenotype_summary',
            'OMIM_phenotype_description',
            'CLINGEN_disease_label',
            'GENCC_disease_name',
            'PANEL_APP_UK_phenotypes',
            'PANEL_APP_AU_phenotypes',
            'DECIPHER_disease_names',
            'CLINVAR_phenotypes',
            'DBNSFP_hpo_name',
        ]
        const textClauses = phenotypeColumns.map(col => `UPPER(${col}) LIKE UPPER('%${escapedQ}%')`)
        const geneClause = `UPPER(gene_symbol) = UPPER('${escapedQ}') OR UPPER(gene_aliases) LIKE UPPER('%${escapedQ}%')`
        return `(${geneClause} OR ${textClauses.join(' OR ')})`
    }

    // ----- Gene-panel / gene-list search helpers -----
    // These support searching a list of genes (typed comma-separated, or uploaded as a TXT/TSV
    // file) against the structured gene identifier columns, plus a "found vs. missing" report.

    // Classify a single search token as a gene identifier. Returns 'ensembl', 'hgnc', 'refseq',
    // 'symbol', or 'other'. 'other' covers genomic regions (contain ':'), multi-word disease phrases
    // (contain whitespace), and anything else that is not shaped like a gene identifier.
    const classifyGeneToken = (token) => {
        const t = String(token == null ? '' : token).trim()
        if (!t) return 'other'
        const up = t.toUpperCase()
        if (/^ENSG\d+(\.\d+)?$/.test(up)) return 'ensembl'
        if (/^HGNC:\d+$/.test(up)) return 'hgnc'
        // RefSeq accession: transcript (NM_/NR_/XM_/XR_), gene (NG_), or protein (NP_/XP_), optional version.
        if (/^[NX][MRGP]_\d+(\.\d+)?$/.test(up)) return 'refseq'
        // Gene-symbol shape: starts alphanumeric, then letters/digits/-/_/. with no whitespace
        // or ':'. This excludes regions like chr1:100-200 and phrases like "limb girdle".
        if (/^[A-Za-z0-9][A-Za-z0-9._-]*$/.test(t)) return 'symbol'
        return 'other'
    }

    // RefSeq accession columns matched for RefSeq gene/transcript IDs: HGNC gene-level RefSeq plus the
    // MANE Select / Plus-Clinical transcript RefSeq accessions. Version suffixes are ignored on both
    // sides. (These columns were added to the pipeline; the BigQuery table must be regenerated for
    // RefSeq matching to work.)
    const REFSEQ_MATCH_COLUMNS = ['refseq_id', 'MANE_canonical_transcript_refseq_id', 'MANE_clinical_transcript_refseq_id']

    // Extra SELECT-list columns needed so the found/missing partition can see RefSeq accessions --
    // but only when the token list actually contains a RefSeq id, so panels of only symbols/IDs don't
    // reference these columns (which may not yet exist in the deployed table).
    const refseqSelectColsFor = (tokens) => tokens.some(t => classifyGeneToken(t) === 'refseq') ? `, ${REFSEQ_MATCH_COLUMNS.join(', ')}` : ''

    // Stricter test used only to decide whether a TYPED comma-separated list should be treated as a
    // gene panel (and get a found/missing banner). Requires an explicit gene ID, or a symbol token
    // that carries a digit or an uppercase letter -- this keeps lowercase free-text disease words
    // (eg. "ataxia", "epilepsy") from being mistaken for gene symbols and mislabeled "not found".
    const isTypedPanelToken = (token) => {
        const kind = classifyGeneToken(token)
        if (kind === 'ensembl' || kind === 'hgnc' || kind === 'refseq') return true
        if (kind !== 'symbol') return false
        return /\d/.test(token) || /[A-Z]/.test(token)
    }

    // Build a WHERE clause matching any of the given gene identifiers against the structured
    // gene_symbol / gene_aliases / ensembl_gene_id / hgnc_gene_id / RefSeq columns (OR across fields
    // and across the whole list). Non-gene-shaped tokens ('other') are ignored. Returns '' if none.
    const buildStructuredGeneListClause = (tokens) => {
        const symbols = new Set(), ensembl = new Set(), hgnc = new Set(), refseq = new Set()
        for (const token of tokens) {
            const kind = classifyGeneToken(token)
            const up = String(token).trim().toUpperCase()
            // ensembl_gene_id / RefSeq accessions are matched version-insensitively; drop any ".NN".
            if (kind === 'ensembl') ensembl.add(up.replace(/\.\d+$/, ''))
            else if (kind === 'hgnc') hgnc.add(up)
            else if (kind === 'refseq') refseq.add(up.replace(/\.\d+$/, ''))
            else if (kind === 'symbol') symbols.add(up)
        }
        const sqlList = (s) => Array.from(s).map(v => `'${escapeSqlString(v)}'`).join(', ')
        const parts = []
        if (symbols.size) {
            parts.push(`UPPER(gene_symbol) IN UNNEST([${sqlList(symbols)}])`)
            // gene_aliases is a comma-separated list of alternate symbols; match any exactly.
            parts.push(`EXISTS(SELECT 1 FROM UNNEST(SPLIT(UPPER(gene_aliases), ',')) alias WHERE TRIM(alias) IN UNNEST([${sqlList(symbols)}]))`)
        }
        if (ensembl.size) parts.push(`UPPER(ensembl_gene_id) IN UNNEST([${sqlList(ensembl)}])`)
        if (hgnc.size) parts.push(`UPPER(hgnc_gene_id) IN UNNEST([${sqlList(hgnc)}])`)
        if (refseq.size) {
            // Extract every RefSeq accession (version stripped) from the gene-level + MANE RefSeq
            // columns and match against the version-stripped tokens.
            const concat = `UPPER(CONCAT(${REFSEQ_MATCH_COLUMNS.map(c => `IFNULL(${c}, '')`).join(", ';', ")}))`
            parts.push(`EXISTS(SELECT 1 FROM UNNEST(REGEXP_EXTRACT_ALL(${concat}, r'[A-Z]+_[0-9]+')) rs WHERE rs IN UNNEST([${sqlList(refseq)}]))`)
        }
        if (!parts.length) return ''
        return `(${parts.join(' OR ')})`
    }

    // Normalize a chromosome name to match gene_chrom (Ensembl seq_region.name): drop any "chr"
    // prefix, uppercase, and map mitochondrial "M" to "MT".
    const normalizeChrom = (c) => {
        let up = String(c == null ? '' : c).trim().toUpperCase().replace(/^CHR/, '')
        if (up === 'M') up = 'MT'
        return up
    }

    // Parse a BED file's text into deduplicated regions. Uses the first 3 columns as
    // chrom, start (0-based), end (1-based half-open). Comment/track/browser and malformed
    // lines are skipped. Returns [{chrom (normalized), start0, end1, label}].
    const parseRegionsFromBedText = (text) => {
        const regions = []
        const seen = new Set()
        for (const line of String(text || '').split(/\r\n|\r|\n/)) {
            const trimmed = line.trim()
            if (!trimmed || /^(#|track\b|browser\b)/i.test(trimmed)) continue
            const cols = trimmed.split(/\s+/)
            if (cols.length < 3 || !/^\d+$/.test(cols[1]) || !/^\d+$/.test(cols[2])) continue
            const chrom = normalizeChrom(cols[0])
            if (!chrom) continue
            const start0 = parseInt(cols[1], 10)
            const end1 = parseInt(cols[2], 10)
            const key = `${chrom}:${start0}-${end1}`
            if (seen.has(key)) continue
            seen.add(key)
            regions.push({ chrom, start0, end1, label: `${cols[0].trim()}:${start0}-${end1}` })
        }
        return regions
    }

    // Parse the first column of an uploaded TXT/TSV/CSV file into deduplicated gene identifiers and
    // hg38 regions (original casing preserved for display). Splits rows on newlines and takes the
    // first tab- or comma-delimited field. A field shaped like an hg38 region (eg. chr1:1000-2000,
    // 1-based inclusive as in the search box) becomes a region; anything else is treated as a gene
    // identifier (symbol, alias, HGNC, ENSG, or RefSeq). A leading header row is skipped. Returns
    // { genes: [token], regions: [{chrom, start0, end1, label}] }.
    const parseUploadedListFile = (text) => {
        const genes = [], regions = []
        const seenGene = new Set(), seenRegion = new Set()
        const headerRegExp = /^(gene|genes|gene[_ ]?symbol|gene[_ ]?name|gene[_ ]?id|symbol|hgnc([_ ]?id)?|ensembl([_ ]?gene[_ ]?id)?|region|regions|locus|coordinates?)$/i
        const lines = String(text || '').split(/\r\n|\r|\n/)
        for (let i = 0; i < lines.length; i++) {
            // Take the first TAB field first so a region using comma thousands-separators
            // (chr17:43,044,295-43,125,483) is not chopped apart before the region test runs.
            const field = lines[i].split('\t')[0].trim()
            if (!field) continue
            const regionMatch = field.match(REFERENCE_REGION_REGEXP)
            if (regionMatch) {
                const chrom = normalizeChrom(regionMatch[1])
                const start1 = parseInt(regionMatch[2].replace(/,/g, ''), 10)
                const end1 = parseInt(regionMatch[3].replace(/,/g, ''), 10)
                const key = `${chrom}:${start1}-${end1}`
                if (chrom && !seenRegion.has(key)) {
                    seenRegion.add(key)
                    // Store 0-based start so region-overlap logic is shared with BED (start0 = start1 - 1).
                    regions.push({ chrom, start0: start1 - 1, end1, label: field })
                }
            } else {
                // Non-region row: take the first comma field (handles CSV) as the gene token, and
                // keep it only if it is shaped like a gene identifier. Free-text phrases (spaces,
                // etc.) are dropped so they can't silently widen the search into a whole-table query.
                const token = field.split(',')[0].trim()
                if (i === 0 && headerRegExp.test(token)) continue  // skip header row
                if (token && classifyGeneToken(token) !== 'other') {
                    const key = token.toUpperCase()
                    if (!seenGene.has(key)) { seenGene.add(key); genes.push(token) }
                }
            }
        }
        return { genes, regions }
    }

    // Build a WHERE clause matching genes that overlap any of the given regions. BED coordinates
    // are 0-based start / 1-based end; gene_start/gene_end are 1-based inclusive, so a gene overlaps
    // a region iff gene_start <= end1 AND gene_end > start0. Returns '' if there are no regions.
    const buildRegionListClause = (regions) => {
        const structs = regions.map(r => `STRUCT('${escapeSqlString(r.chrom)}' AS c, ${r.start0} AS s, ${r.end1} AS e)`)
        if (!structs.length) return ''
        return `EXISTS(SELECT 1 FROM UNNEST([${structs.join(', ')}]) r WHERE gene_chrom = r.c AND gene_start <= r.e AND gene_end > r.s)`
    }

    // Given the input regions and the gene rows returned by a region-overlap lookup (each with
    // gene_chrom, gene_start, gene_end), partition the input regions into { matched, missing }
    // (arrays of region labels): matched = overlaps >= 1 gene, missing = overlaps none.
    const partitionRegionMatches = (regions, rows) => {
        const byChrom = new Map()
        for (const row of (rows || [])) {
            const c = String(row.gene_chrom == null ? '' : row.gene_chrom).toUpperCase()
            if (!byChrom.has(c)) byChrom.set(c, [])
            byChrom.get(c).push({ s: Number(row.gene_start), e: Number(row.gene_end) })
        }
        const matched = [], missing = []
        const seen = new Set()
        for (const region of regions) {
            const key = `${region.chrom}:${region.start0}-${region.end1}`
            if (seen.has(key)) continue
            seen.add(key)
            const genes = byChrom.get(region.chrom) || []
            const ok = genes.some(g => g.s <= region.end1 && g.e > region.start0)
            ;(ok ? matched : missing).push(region.label)
        }
        return { matched, missing }
    }

    // Given the input gene tokens and the rows returned by a structured gene-list lookup (with
    // gene_symbol, gene_aliases, ensembl_gene_id, hgnc_gene_id, and -- when RefSeq tokens are present
    // -- the RefSeq columns), partition the input tokens into { matched, missing } (both arrays of
    // original-cased tokens, deduplicated). 'other' tokens are excluded from both.
    const partitionGeneListMatches = (tokens, matchedRows) => {
        const symbolSet = new Set(), ensemblSet = new Set(), hgncSet = new Set(), refseqSet = new Set()
        for (const row of (matchedRows || [])) {
            if (row.gene_symbol) symbolSet.add(String(row.gene_symbol).toUpperCase())
            if (row.gene_aliases) {
                for (const alias of String(row.gene_aliases).split(',')) {
                    const v = alias.trim().toUpperCase()
                    if (v) symbolSet.add(v)
                }
            }
            if (row.ensembl_gene_id) ensemblSet.add(String(row.ensembl_gene_id).toUpperCase().replace(/\.\d+$/, ''))
            if (row.hgnc_gene_id) hgncSet.add(String(row.hgnc_gene_id).toUpperCase())
            for (const col of REFSEQ_MATCH_COLUMNS) {
                const accs = row[col] ? String(row[col]).toUpperCase().match(/[A-Z]+_[0-9]+/g) : null
                if (accs) for (const a of accs) refseqSet.add(a)  // version already excluded by the regex
            }
        }
        const matched = [], missing = []
        const seen = new Set()
        for (const token of tokens) {
            const kind = classifyGeneToken(token)
            if (kind === 'other') continue
            const up = String(token).trim().toUpperCase()
            const key = (kind === 'ensembl' || kind === 'refseq') ? up.replace(/\.\d+$/, '') : up
            if (seen.has(key)) continue
            seen.add(key)
            const ok = kind === 'ensembl' ? ensemblSet.has(key)
                : kind === 'hgnc' ? hgncSet.has(key)
                : kind === 'refseq' ? refseqSet.has(key)
                : symbolSet.has(key)
            ;(ok ? matched : missing).push(String(token).trim())
        }
        return { matched, missing }
    }

    /**
     * Build a WHERE clause for custom filters.
     * Custom filters are stored in GLOBAL_PAGE_STATE.customFilters as
     * "col|op|val|conj;col|op|val|conj" where op is a SQL operator
     * (=, !=, >, <, >=, <=, LIKE, NOT LIKE, IS NULL, IS NOT NULL) and conj is AND/OR.
     * Rows are combined with their per-row conjunction (the first row's
     * conjunction is ignored). Older 3-segment URLs default to AND.
     */
    const buildCustomFiltersWhereClause = () => {
        const filtersStr = GLOBAL_PAGE_STATE.customFilters
        if (!filtersStr || !filtersStr.trim()) return ''

        const allowedOps = new Set(['=', '!=', '>', '<', '>=', '<=', 'LIKE', 'NOT LIKE', 'IS NULL', 'IS NOT NULL'])
        const items = [] // {conjunction, clause}
        for (const filterStr of filtersStr.split(';')) {
            const parts = filterStr.split('|')
            if (parts.length < 2) continue

            const col = parts[0]
            const op = parts[1]
            const last = parts[parts.length - 1]
            const hasConjunction = (last === 'AND' || last === 'OR') && parts.length >= 4
            const conjunction = hasConjunction ? last : 'AND'
            const valueEncoded = hasConjunction
                ? parts.slice(2, -1).join('|')
                : parts.slice(2).join('|')
            let val
            try {
                val = decodeURIComponent(valueEncoded)
            } catch (e) {
                val = valueEncoded
            }

            // Validate column name and operator
            if (!BIGQUERY_COLUMN_DESCRIPTIONS[col] && !TABLE_COLUMNS[col]) continue
            if (!allowedOps.has(op)) continue

            let clause
            if (op === 'IS NULL' || op === 'IS NOT NULL') {
                // load_bigquery.py fills NaN in object columns with '' before upload, so
                // absent string values are stored as empty strings, not NULL. Match both.
                const colType = BIGQUERY_COLUMN_TYPES[col]
                // INTEGER/FLOAT/BOOLEAN columns store real NULLs (never empty strings), so a plain
                // IS NULL / IS NOT NULL is correct; string columns may hold '' instead of NULL.
                if (colType !== 'INTEGER' && colType !== 'FLOAT' && colType !== 'BOOLEAN') {
                    clause = op === 'IS NULL'
                        ? `(${col} IS NULL OR ${col} = '')`
                        : `(${col} IS NOT NULL AND ${col} != '')`
                } else {
                    clause = `${col} ${op}`
                }
            } else if (op === 'LIKE' || op === 'NOT LIKE') {
                clause = `${col} ${op} '${escapeSqlString(val)}'`
            } else {
                const colType = BIGQUERY_COLUMN_TYPES[col]
                if (colType === 'BOOLEAN') {
                    // Accept true/false, yes/no, or 1/0 (case-insensitive). validateForm() rejects anything
                    // else before we get here, so this never silently coerces unexpected text to false.
                    clause = `${col} ${op} ${/^(true|yes|y|1)$/i.test(val.trim()) ? 'true' : 'false'}`
                } else {
                    const isNumericCol = colType === 'INTEGER' || colType === 'FLOAT'
                    if (isNumericCol && val.trim() !== '' && isFinite(Number(val))) {
                        clause = `${col} ${op} ${Number(val)}`
                    } else {
                        clause = `${col} ${op} '${escapeSqlString(val)}'`
                    }
                }
            }
            items.push({ conjunction, clause })
        }

        if (items.length === 0) return ''
        if (items.length === 1) return items[0].clause
        let combined = items[0].clause
        for (let i = 1; i < items.length; i++) {
            combined += ` ${items[i].conjunction} ${items[i].clause}`
        }
        return `(${combined})`
    }

    const DEFAULT_VISIBLE_COLUMNS = [
        'gene_symbol',
        'inheritance',
        'sources',
        'LLM_phenotype_summary',
        'pLI_v4',
        'lof_oe_ci_upper_v4',
        'CLINGEN_classification',
    ]


</script>
</head>
